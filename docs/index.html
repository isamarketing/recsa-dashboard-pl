<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECSA — Dashboard Integral P&L</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--s1:#111827;--s2:#1a2235;--bd:#2a3450;--tx:#e8ecf4;--t2:#8899b4;--ac:#4f8cff;--gn:#00d4aa;--rd:#ff4d6a;--or:#ffb84d;--pu:#a78bfa}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx)}
.header{background:linear-gradient(135deg,#0d1117,#1a2235);border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.header h1{font-size:20px;font-weight:700}.header h1 span{color:var(--ac)}
.header .sub{color:var(--t2);font-size:11px;margin-top:2px}
.params-bar{display:flex;gap:16px;padding:8px 24px;background:var(--s2);border-bottom:1px solid var(--bd);align-items:center;flex-wrap:wrap}
.params-bar label{font-size:10px;color:var(--t2)}
.params-bar input[type=number]{width:72px;background:var(--s1);border:1px solid var(--bd);color:var(--ac);padding:3px 6px;border-radius:4px;font-family:'JetBrains Mono';font-size:11px;text-align:right}
.params-bar .sep{width:1px;height:20px;background:var(--bd)}
.tabs{display:flex;gap:0;background:var(--s1);border-bottom:1px solid var(--bd);padding:0 24px;overflow-x:auto}
.tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--tx)}.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.tab.sec{color:var(--or)}.tab.sec.active{color:var(--or);border-bottom-color:var(--or)}
.content{padding:20px;max-width:1500px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px;text-align:center}
.kpi .lb{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:1px}
.kpi .vl{font-family:'JetBrains Mono';font-size:18px;font-weight:600;margin-top:4px}
.kpi .delta{font-size:10px;margin-top:3px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:16px}
.card h3{font-size:13px;color:var(--or);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.card.full{grid-column:1/-1}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:var(--s1);color:var(--t2);padding:7px 8px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;z-index:1}
td{padding:4px 8px;border-bottom:1px solid rgba(42,52,80,.4)}
tr:hover{background:rgba(79,140,255,.03)}
.mono{font-family:'JetBrains Mono';font-size:11px}
.neg{color:var(--rd)}.pos{color:var(--gn)}.warn{color:var(--or)}
.tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600}
.tag-ok{background:rgba(0,212,170,.15);color:var(--gn)}
.tag-bad{background:rgba(255,77,106,.15);color:var(--rd)}
.tag-warn{background:rgba(255,184,77,.15);color:var(--or)}
.sr{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.sr .lb{color:var(--t2)}.sr .vl{font-family:'JetBrains Mono';font-weight:600}
.btn-sm{padding:5px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-family:'DM Sans';font-size:11px;cursor:pointer}
.btn-sm:hover{border-color:var(--ac);color:var(--ac)}
.btn-load{padding:5px 12px;border-radius:6px;border:1px solid var(--ac);background:rgba(79,140,255,.1);color:var(--ac);font-family:'DM Sans';font-size:11px;font-weight:600;cursor:pointer}
.btn-load:hover{background:var(--ac);color:#fff}
.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filters select,.filters input{background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:5px 10px;border-radius:6px;font-family:'DM Sans';font-size:11px}
.filters input[type=text]{flex:1;min-width:120px}
input[type=range]{width:60px;height:4px;-webkit-appearance:none;background:var(--bd);border-radius:2px;outline:none;cursor:pointer;vertical-align:middle}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--ac);border-radius:50%;cursor:pointer}
.pv{font-family:'JetBrains Mono';font-size:10px;color:var(--ac);min-width:28px;display:inline-block;text-align:right}
.sidebar{background:var(--s1);border-left:1px solid var(--bd);padding:16px;overflow-y:auto}
.sidebar h3{font-size:13px;margin-bottom:12px;color:var(--or)}
.main-2col{display:grid;grid-template-columns:1fr 300px;min-height:calc(100vh - 200px)}
.bar{height:7px;background:var(--bd);border-radius:4px;margin-top:6px;overflow:hidden;display:flex}
.bar .s{height:100%;transition:width .3s}
.s1{background:var(--ac)}.s2{background:var(--gn)}.s3{background:var(--or)}.s4{background:var(--pu)}
.legend{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--t2)}
.legend i{width:7px;height:7px;border-radius:2px;display:inline-block}
.alert-box{background:rgba(255,77,106,.08);border:1px solid rgba(255,77,106,.25);border-radius:8px;padding:10px;margin-top:10px}
.alert-box h4{color:var(--rd);font-size:11px;margin-bottom:4px}
.alert-box p{font-size:10px;color:var(--t2);padding:1px 0}
@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}.main-2col{grid-template-columns:1fr}}
</style>
</head>

</div>

// ===== P&L CALCULATIONS =====
function calcPL(p){
  var pv=p.pv, mp=p.mp, r=p.r||1;
  var mod=gp('pMOD'), fl=gp('pFL'), gf=gp('pGF');
  var impPct=gp('pIMP')/100;
  var imp=pv*impPct;
  var cmg=pv-mp/r-mod-imp-fl;
  var cmgPct=pv>0?cmg/pv:0;
  var ebitda=cmg-gf;
  var ebitdaPct=pv>0?ebitda/pv:0;
  var am=p.am||0;
  var ebit=ebitda-am;
  // CF inventario computed from inventory tab
  var tna=gp('pTNA')/100;
  var sd=p.lt+p.ss;
  var sk=p.v>0?(p.v/365)*sd:0;
  var su=sk*mp;
  var cfi=p.v>0?(su*tna)/(p.v*365)*sd:0;
  var ifin=gp('pFIN');
  var rai=ebit-ifin-cfi;
  var rev=pv*p.v;
  var ebitdaAbs=ebitda*p.v;
  var cmgAbs=cmg*p.v;
  return {pv:pv,mp:mp,r:r,mod:mod,imp:imp,fl:fl,cmg:cmg,cmgPct:cmgPct,gf:gf,ebitda:ebitda,ebitdaPct:ebitdaPct,am:am,ebit:ebit,ifin:ifin,cfi:cfi,rai:rai,rev:rev,ebitdaAbs:ebitdaAbs,cmgAbs:cmgAbs,v:p.v,l:p.l,p:p.p,o:p.o,lt:p.lt,ss:p.ss};
}
function calcAllPL(){var r=[];for(var i=0;i<P.length;i++)r.push(calcPL(P[i]));return r;}
function totalsPL(items){var rev=0,ebitda=0,cmg=0,vol=0,np=0,nn=0;for(var i=0;i<items.length;i++){var c=items[i];rev+=c.rev;ebitda+=c.ebitdaAbs;cmg+=c.cmgAbs;vol+=c.v;if(c.ebitda>0)np++;else nn++;}return{rev:rev,ebitda:ebitda,cmg:cmg,vol:vol,margin:rev>0?(ebitda/rev*100).toFixed(1):'0',cmgMargin:rev>0?(cmg/rev*100).toFixed(1):'0',n:items.length,np:np,nn:nn};}

// ===== INVENTORY CALCULATIONS =====
function calcInv(p){
  var tna=gp('pTNA')/100;
  var sd=p.lt+p.ss;
  var sk=p.v>0?(p.v/365)*sd:0;
  var su=sk*p.mp;
  var cfd=p.v>0?(su*tna)/(p.v*365):0;
  var cfs=cfd*sd;
  var cfp=p.mp>0?cfs/p.mp:0;
  var cfa=cfs*p.v;
  return{sd:sd,sk:sk,su:su,cfd:cfd,cfs:cfs,cfp:cfp,cfa:cfa};
}

function fmt(n){return Math.abs(n).toLocaleString("es-AR",{maximumFractionDigits:0})}

function doFPR(){
  var all=calcAllPL();var fl_v=document.getElementById("pr-l").value;var st=document.getElementById("pr-st").value;var fs=document.getElementById("pr-s").value.toLowerCase();
  var mod=gp('pMOD'),fl=gp('pFL'),gf=gp('pGF'),impPct=gp('pIMP')/100;
  var items=[];for(var i=0;i<all.length;i++){var c=all[i];if(c.v<=0)continue;if(fl_v!=="ALL"&&c.l!==fl_v)continue;if(fs&&(c.p+c.l).toLowerCase().indexOf(fs)<0)continue;
  var cb=(c.mp/c.r)+mod+fl+gf;var pBE=cb/(1-impPct);if(st==="BAJO"&&c.pv>=pBE)continue;if(st==="OK"&&c.pv<pBE)continue;
  var pCMG15=((c.mp/c.r)+mod+fl)/(1-impPct-0.15);var cmg15=pCMG15-(c.mp/c.r)-mod-pCMG15*impPct-fl;var p20=pBE*1.20;var e20=p20-(c.mp/c.r)-mod-p20*impPct-fl-gf;var p30=pBE*1.30;var e30=p30-(c.mp/c.r)-mod-p30*impPct-fl-gf;var p40=pBE*1.40;var e40=p40-(c.mp/c.r)-mod-p40*impPct-fl-gf;
  items.push({l:c.l,p:c.p,pv:c.pv,ebitda:c.ebitda,pBE:pBE,pCMG15:pCMG15,cmg15:cmg15,p20:p20,e20:e20,p30:p30,e30:e30,p40:p40,e40:e40,gap:c.pv-pBE,v:c.v});}
  items.sort(function(a,b){return a.gap-b.gap});
  var h='<table><thead><tr><th>Línea</th><th>Producto</th><th style="text-align:right">P.Actual</th><th style="text-align:right">EBITDA Act</th><th style="text-align:right;color:var(--ac)">P.CMG15%</th><th style="text-align:right;color:var(--ac)">CMG 15%</th><th style="text-align:right;color:var(--or)">Breakeven</th><th style="text-align:right;color:var(--gn)">P.+20%</th><th style="text-align:right;color:var(--gn)">EBITDA+20%</th><th style="text-align:right;color:var(--gn)">P.+30%</th><th style="text-align:right;color:var(--gn)">EBITDA+30%</th><th style="text-align:right;color:var(--gn)">P.+40%</th><th style="text-align:right;color:var(--gn)">EBITDA+40%</th><th style="text-align:right">Gap</th><th>Vol</th><th>Status</th></tr></thead><tbody>';
  for(var i=0;i<items.length;i++){var c=items[i];var gc=c.gap>=0?'var(--gn)':'var(--rd)';var tag=c.gap>=c.pBE*0.4?'<span class="tag tag-ok">≥+40%</span>':c.gap>=c.pBE*0.3?'<span class="tag tag-ok">≥+30%</span>':c.gap>=c.pBE*0.2?'<span class="tag tag-ok">≥+20%</span>':c.pv>=c.pCMG15?'<span class="tag tag-ok">≥CMG15</span>':c.gap>=0?'<span class="tag tag-warn">≥BE</span>':'<span class="tag tag-bad">BAJO</span>';var rb=c.gap<0?'background:rgba(255,77,106,.04);':'';
  h+='<tr style="'+rb+'"><td style="font-size:10px;color:var(--t2)">'+c.l+'</td><td style="font-weight:500">'+c.p+'</td><td class="mono" style="text-align:right">'+fd(c.pv)+'</td><td class="mono" style="text-align:right;color:'+(c.ebitda>=0?'var(--gn)':'var(--rd)')+'">'+fd(c.ebitda)+'</td><td class="mono" style="text-align:right;color:var(--or);font-weight:600">'+fd(c.pCMG15)+'</td><td class="mono" style="text-align:right;color:var(--ac)">'+fd(c.cmg15)+'</td><td class="mono" style="text-align:right;color:var(--or);font-weight:600">'+fd(c.pBE)+'</td><td class="mono" style="text-align:right;color:var(--gn)">'+fd(c.p20)+'</td><td class="mono" style="text-align:right;color:var(--gn)">'+fd(c.e20)+'</td><td class="mono" style="text-align:right;color:var(--gn)">'+fd(c.p30)+'</td><td class="mono" style="text-align:right;color:var(--gn)">'+fd(c.e30)+'</td><td class="mono" style="text-align:right;color:var(--gn)">'+fd(c.p40)+'</td><td class="mono" style="text-align:right;color:var(--gn)">'+fd(c.e40)+'</td><td class="mono" style="text-align:right;color:'+gc+'">'+(c.gap>=0?'+':'')+fd(c.gap)+'</td><td class="mono">'+fmt(c.v)+'</td><td>'+tag+'</td></tr>';}
  h+='</tbody></table>';document.getElementById("pr-tbl").innerHTML=h;

function simU(i,val){var c=window._sim[i];var np=val/100;window._sp[i]=np;document.getElementById("sp"+i).textContent=fd(np);var ne=c.ebitda+(np-c.pv);var nt=ne*c.v;var d=nt-c.ebitdaAbs;document.getElementById("se"+i).textContent=fd(ne);document.getElementById("se"+i).style.color=ne>=0?"var(--gn)":"var(--rd)";document.getElementById("st"+i).textContent=fmt(nt);document.getElementById("st"+i).style.color=nt>=0?"var(--gn)":"var(--rd)";document.getElementById("sd"+i).textContent=(d>=0?"+":"")+fmt(d);document.getElementById("sd"+i).style.color=d>=0?"var(--gn)":"var(--rd)";var td=0;for(var j=0;j<window._sim.length;j++){var sp=window._sim[j];td+=(sp.ebitda+(window._sp[j]-sp.pv))*sp.v-sp.ebitdaAbs;}var t=totalsPL(calcAllPL());var nw=t.ebitda+td;document.getElementById("simTE").textContent="USD "+(nw<0?"-":"")+fmt(nw);document.getElementById("simTE").style.color=nw>=0?"var(--gn)":"var(--rd)";document.getElementById("simTD").textContent="USD "+(td>=0?"+":"")+fmt(td);document.getElementById("simTD").style.color=td>=0?"var(--gn)":"var(--rd)";}

function renderGastos(){
  if(G.length===0){
    var h='<div style="text-align:center;padding:80px 40px"><h2 style="color:var(--or);margin-bottom:16px">💼 Asignación de Gastos Operativos</h2><p style="color:var(--t2);margin-bottom:24px">Cargue el archivo Excel de Gastos Operativos (INPUT_3_Gastos_Operativos.xlsx)</p>';

    document.getElementById("content").innerHTML=h;return;
  }
  var tc=gp('pTC'),volR=gp('pVol'),volV=G_VOL_V;
  var r={cdir:0,fijo:0,logis:0,back:0},v={cdir:0,fijo:0,logis:0,back:0},totalCost=0,unassigned=0;
  G.forEach(function(g,i){var cf=g.costo_final,a=GA[i];var sum=a.cdir_r+a.fijo_r+a.logis_r+a.back_r+a.cdir_v+a.fijo_v+a.logis_v+a.back_v;r.cdir+=cf*a.cdir_r;r.fijo+=cf*a.fijo_r;r.logis+=cf*a.logis_r;r.back+=cf*a.back_r;v.cdir+=cf*a.cdir_v;v.fijo+=cf*a.fijo_v;v.logis+=cf*a.logis_v;v.back+=cf*a.back_v;totalCost+=cf;if(Math.abs(sum)<.01&&cf!==0)unassigned++;});
  r.total=r.cdir+r.fijo+r.logis+r.back;v.total=v.cdir+v.fijo+v.logis+v.back;
  var rPerKg=Math.abs(r.total)/tc/volR;var vPerKg=Math.abs(v.total)/tc/volV;
  // Auto-update P&L params
  var newGF=(Math.abs(r.fijo)+Math.abs(r.back))/tc/volR;
  var newMOD=(Math.abs(r.cdir)+Math.abs(r.logis))/tc/volR;
  document.getElementById('pGF').value=newGF.toFixed(4);
  document.getElementById('pMOD').value=newMOD.toFixed(4);
  if(document.getElementById('pGFdisplay'))document.getElementById('pGFdisplay').textContent=newGF.toFixed(4);
  if(document.getElementById('pMODdisplay'))document.getElementById('pMODdisplay').textContent=newMOD.toFixed(4);

  var fmtG=function(n){return Math.abs(n).toLocaleString('es-AR',{maximumFractionDigits:0})};
  var h='<div class="kpis" style="grid-template-columns:repeat(6,1fr)">';
  h+='<div class="kpi"><div class="lb">Gasto Total</div><div class="vl">ARS '+fmtG(totalCost)+'</div></div>';
  h+='<div class="kpi"><div class="lb">→ RECSA</div><div class="vl" style="color:var(--ac)">ARS '+fmtG(r.total)+'</div></div>';
  h+='<div class="kpi"><div class="lb">→ VIVALCE</div><div class="vl" style="color:var(--gn)">ARS '+fmtG(v.total)+'</div></div>';
  h+='<div class="kpi"><div class="lb">USD/kg RECSA</div><div class="vl" style="color:var(--ac)">USD '+rPerKg.toFixed(2)+'</div></div>';
  h+='<div class="kpi"><div class="lb">USD/kg VIVALCE</div><div class="vl" style="color:var(--gn)">USD '+vPerKg.toFixed(2)+'</div></div>';
  h+='<div class="kpi"><div class="lb">Sin Asignar</div><div class="vl" style="color:'+(unassigned>0?'var(--rd)':'var(--gn)')+'">'+unassigned+'</div></div></div>';
  h+='<div style="padding:8px 0;font-size:11px;color:var(--gn)">✅ GF y MOD del P&L actualizados automáticamente — GF: USD '+newGF.toFixed(4)+'/kg · MOD: USD '+newMOD.toFixed(4)+'/kg</div>';
  h+='<div class="card full"><h3>Asignación por Gasto</h3><div style="margin-bottom:8px;display:flex;gap:8px"><select id="g-emp" onchange="renderGTbl()" style="background:var(--s1);border:1px solid var(--bd);color:var(--tx);padding:4px 8px;border-radius:6px;font-size:11px"><option value="ALL">Todas</option><option value="RECSA">RECSA</option><option value="VIVALCE">VIVALCE</option></select><input id="g-s" placeholder="Buscar..." oninput="renderGTbl()" style="background:var(--s1);border:1px solid var(--bd);color:var(--tx);padding:4px 8px;border-radius:6px;font-size:11px;flex:1"></div>';
  h+='<div id="g-tbl" style="max-height:calc(100vh - 380px);overflow-y:auto"></div></div>';
  document.getElementById("content").innerHTML=h;renderGTbl();
}
function renderGTbl(){
  var fe=document.getElementById('g-emp').value;var fs=document.getElementById('g-s').value.toLowerCase();
  var filtered=G.map(function(g,i){return Object.assign({},g,{i:i})}).filter(function(g){if(fe!=='ALL'&&g.empresa!==fe)return false;if(fs&&!(g.nombre+g.concepto+g.posicion).toLowerCase().includes(fs))return false;return true;});
  var fmtG=function(n){return Math.abs(n).toLocaleString('es-AR',{maximumFractionDigits:0})};
  var h='<table><thead><tr><th>Emp</th><th>Concepto</th><th>Nombre</th><th style="text-align:right">Costo</th><th style="text-align:center;color:var(--ac)">RECSA</th><th style="text-align:center;color:var(--ac)">RECSA L+B</th><th style="text-align:center;color:var(--gn)">VIVALCE</th><th style="text-align:center;color:var(--gn)">VIVALCE L+B</th><th>Σ</th></tr></thead><tbody>';
  filtered.forEach(function(g){var i=g.i,a=GA[i];var sR1=a.cdir_r+a.fijo_r,sR2=a.logis_r+a.back_r,sV1=a.cdir_v+a.fijo_v,sV2=a.logis_v+a.back_v;var total=sR1+sR2+sV1+sV2;var ok=Math.abs(total-1)<=.05||g.costo_final===0;var tag=g.empresa==='RECSA'?'<span class="tag" style="background:rgba(79,140,255,.15);color:var(--ac)">R</span>':'<span class="tag" style="background:rgba(0,212,170,.15);color:var(--gn)">V</span>';
  h+='<tr><td>'+tag+'</td><td style="font-size:10px;color:var(--t2)">'+g.concepto+'</td><td style="font-weight:500;font-size:11px">'+g.nombre+'</td><td class="mono" style="text-align:right">'+fmtG(g.costo_final)+'</td>';
  h+='<td><input type="range" min="0" max="100" value="'+Math.round(sR1*100)+'" oninput="updG('+i+',\x27r1\x27,this.value)" style="width:50px"><span class="pv" id="gv'+i+'r1">'+Math.round(sR1*100)+'%</span></td>';
  h+='<td><input type="range" min="0" max="100" value="'+Math.round(sR2*100)+'" oninput="updG('+i+',\x27r2\x27,this.value)" style="width:50px"><span class="pv" id="gv'+i+'r2">'+Math.round(sR2*100)+'%</span></td>';
  h+='<td><input type="range" min="0" max="100" value="'+Math.round(sV1*100)+'" oninput="updG('+i+',\x27v1\x27,this.value)" style="width:50px"><span class="pv" id="gv'+i+'v1">'+Math.round(sV1*100)+'%</span></td>';
  h+='<td><input type="range" min="0" max="100" value="'+Math.round(sV2*100)+'" oninput="updG('+i+',\x27v2\x27,this.value)" style="width:50px"><span class="pv" id="gv'+i+'v2">'+Math.round(sV2*100)+'%</span></td>';
  h+='<td class="mono" style="color:'+(ok?'var(--gn)':'var(--rd)')+'">'+Math.round(total*100)+'%</td></tr>';});
  h+='</tbody></table>';document.getElementById("g-tbl").innerHTML=h;
}
function updG(i,group,val){
  var pct=val/100,a=GA[i];
  if(group==='r1'){var old=a.cdir_r+a.fijo_r;if(old>0){a.cdir_r=pct*(a.cdir_r/old);a.fijo_r=pct*(a.fijo_r/old)}else{a.cdir_r=pct*.5;a.fijo_r=pct*.5}}
  else if(group==='r2'){var old=a.logis_r+a.back_r;if(old>0){a.logis_r=pct*(a.logis_r/old);a.back_r=pct*(a.back_r/old)}else{a.logis_r=pct*.5;a.back_r=pct*.5}}
  else if(group==='v1'){var old=a.cdir_v+a.fijo_v;if(old>0){a.cdir_v=pct*(a.cdir_v/old);a.fijo_v=pct*(a.fijo_v/old)}else{a.cdir_v=pct*.5;a.fijo_v=pct*.5}}
  else if(group==='v2'){var old=a.logis_v+a.back_v;if(old>0){a.logis_v=pct*(a.logis_v/old);a.back_v=pct*(a.back_v/old)}else{a.logis_v=pct*.5;a.back_v=pct*.5}}
  document.getElementById('gv'+i+group).textContent=val+'%';
  renderGastos();
}

function loadGastos(file){
  if(!file)return;var reader=new FileReader();
  reader.onload=function(e){try{
    var wb=XLSX.read(e.target.result,{type:'array',cellFormula:false});var ws=wb.Sheets[wb.SheetNames[0]];var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:0,raw:true});
    var hdrs=rows[0].map(function(h){return String(h||'').toLowerCase().trim()});var cm={};
    hdrs.forEach(function(h,i){if(h.includes('concepto'))cm.concepto=i;else if(h.includes('nombre'))cm.nombre=i;else if(h.includes('posici'))cm.posicion=i;else if(h.includes('empresa'))cm.empresa=i;else if(h.includes('bruto'))cm.bruto=i;else if(h.includes('factor'))cm.factor=i;else if(h.includes('costo final'))cm.costoFinal=i;else if(h.includes('cdir')&&h.includes('recsa'))cm.cdirR=i;else if(h.includes('fijo')&&h.includes('recsa'))cm.fijoR=i;else if(h.includes('log')&&h.includes('recsa'))cm.logisR=i;else if(h.includes('back')&&h.includes('recsa'))cm.backR=i;else if(h.includes('cdir')&&h.includes('vivalce'))cm.cdirV=i;else if(h.includes('fijo')&&h.includes('vivalce'))cm.fijoV=i;else if(h.includes('log')&&h.includes('vivalce'))cm.logisV=i;else if(h.includes('back')&&h.includes('vivalce'))cm.backV=i;});
    G=[];for(var r=1;r<rows.length;r++){var row=rows[r];var concepto=String(row[cm.concepto]||'').trim();var nombre=String(row[cm.nombre]||'').trim();if(!concepto&&!nombre)continue;if(concepto==='RESUMEN'||concepto==='Total')continue;
    var bruto=parseFloat(row[cm.bruto])||0;var factor=parseFloat(row[cm.factor])||0;var cf=parseFloat(row[cm.costoFinal]);if(isNaN(cf)||cf===0)cf=factor===0?bruto:bruto*(1+factor);if(cf===0)continue;
    var pf=function(v){var n=parseFloat(v);return isNaN(n)?0:n};
    G.push({concepto:concepto,nombre:nombre,posicion:String(row[cm.posicion]||'').trim(),empresa:String(row[cm.empresa]||'').trim(),costo_final:cf,pct_cdir_r:pf(row[cm.cdirR]),pct_fijo_r:pf(row[cm.fijoR]),pct_logis_r:pf(row[cm.logisR]),pct_back_r:pf(row[cm.backR]),pct_cdir_v:pf(row[cm.cdirV]),pct_fijo_v:pf(row[cm.fijoV]),pct_logis_v:pf(row[cm.logisV]),pct_back_v:pf(row[cm.backV])});}
    G.forEach(function(g,i){GA[i]={cdir_r:g.pct_cdir_r,fijo_r:g.pct_fijo_r,logis_r:g.pct_logis_r,back_r:g.pct_back_r,cdir_v:g.pct_cdir_v,fijo_v:g.pct_fijo_v,logis_v:g.pct_logis_v,back_v:g.pct_back_v};});
    renderGastos();
  }catch(err){alert('Error: '+err.message);}};reader.readAsArrayBuffer(file);
}

function loadMaster(file){
  if(!file)return;var reader=new FileReader();
  reader.onload=function(e){try{
    var wb=XLSX.read(e.target.result,{type:'array'});var ws=wb.Sheets[wb.SheetNames[0]];var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:0,raw:true});
    var hdrs=rows[0].map(function(h){return String(h||'').toLowerCase().trim()});var cm={};
    hdrs.forEach(function(h,i){if(h.includes('línea')||h.includes('linea'))cm.l=i;else if(h.includes('producto'))cm.p=i;else if(h.includes('precio'))cm.pv=i;else if(h.includes('mp'))cm.mp=i;else if(h.includes('rendimiento'))cm.r=i;else if(h.includes('vol'))cm.v=i;else if(h.includes('origen'))cm.o=i;else if(h.includes('lead'))cm.lt=i;else if(h.includes('stock seg')||h.includes('seguridad'))cm.ss=i;});
    var newP=[];for(var r=1;r<rows.length;r++){var row=rows[r];var prod=String(row[cm.p]||'').trim();if(!prod)continue;var pf=function(v){var n=parseFloat(v);return isNaN(n)?0:Math.abs(n)};
    newP.push({l:String(row[cm.l]||'').trim(),p:prod,pv:pf(row[cm.pv]),mp:pf(row[cm.mp]),r:pf(row[cm.r])||1,v:pf(row[cm.v]),am:0,ifin:0,o:cm.o!==undefined?String(row[cm.o]||'').trim():'LOCAL',lt:cm.lt!==undefined?Math.round(pf(row[cm.lt]))||30:30,ss:cm.ss!==undefined?Math.round(pf(row[cm.ss]))||15:15});}
    if(newP.length>0){P=newP;document.getElementById('dataSource').textContent='Excel: '+file.name+' ('+newP.length+')';document.getElementById('dataSource').style.color='var(--gn)';renderContent();}
  }catch(err){alert('Error: '+err.message);}};reader.readAsArrayBuffer(file);
}
