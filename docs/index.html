<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECSA — Dashboard P&L por Producto</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--s1:#111827;--s2:#1a2235;--bd:#2a3450;--tx:#e8ecf4;--t2:#8899b4;--ac:#4f8cff;--gn:#00d4aa;--rd:#ff4d6a;--or:#ffb84d;--pu:#a78bfa}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx)}
.header{background:linear-gradient(135deg,#0d1117,#1a2235);border-bottom:1px solid var(--bd);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.header h1{font-size:20px;font-weight:700}.header h1 span{color:var(--ac)}
.header .sub{color:var(--t2);font-size:12px;margin-top:2px}
.params-bar{display:flex;gap:20px;padding:10px 24px;background:var(--s2);border-bottom:1px solid var(--bd);align-items:center;flex-wrap:wrap}
.params-bar label{font-size:11px;color:var(--t2)}
.params-bar input[type=number]{width:80px;background:var(--s1);border:1px solid var(--bd);color:var(--ac);padding:4px 8px;border-radius:4px;font-family:'JetBrains Mono';font-size:11px;text-align:right}
.params-bar .sep{width:1px;height:24px;background:var(--bd)}
.tabs{display:flex;gap:0;background:var(--s1);border-bottom:1px solid var(--bd);padding:0 24px}
.tab{padding:12px 20px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--tx)}.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.content{padding:24px;max-width:1500px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px}
.kpi{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:14px;text-align:center}
.kpi .lb{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:1px}
.kpi .vl{font-family:'JetBrains Mono';font-size:20px;font-weight:600;margin-top:4px}
.kpi .delta{font-size:11px;margin-top:3px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:16px}
.card h3{font-size:13px;color:var(--or);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.card.full{grid-column:1/-1}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--s1);color:var(--t2);padding:8px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;z-index:1}
td{padding:5px 8px;border-bottom:1px solid rgba(42,52,80,.4)}
tr:hover{background:rgba(79,140,255,.03)}
.mono{font-family:'JetBrains Mono';font-size:11px}
.neg{color:var(--rd)}.pos{color:var(--gn)}.warn{color:var(--or)}
.tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600}
.tag-ok{background:rgba(0,212,170,.15);color:var(--gn)}
.tag-bad{background:rgba(255,77,106,.15);color:var(--rd)}
.tag-warn{background:rgba(255,184,77,.15);color:var(--or)}
.sr{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.sr .lb{color:var(--t2)}.sr .vl{font-family:'JetBrains Mono';font-weight:600}
.btn-sm{padding:6px 14px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-family:'DM Sans';font-size:12px;cursor:pointer;transition:all .2s}
.btn-sm:hover{border-color:var(--ac);color:var(--ac)}
.btn-load{padding:8px 16px;border-radius:6px;border:1px solid var(--ac);background:rgba(79,140,255,.1);color:var(--ac);font-family:'DM Sans';font-size:12px;font-weight:600;cursor:pointer}
.btn-load:hover{background:var(--ac);color:#fff}
.hidden{display:none}
@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <div><h1><span>RECSA</span> — P&L por Producto</h1><div class="sub">Dashboard de Perdidas & Ganancias | Datos anualizados en USD · <span id="dataSource" style="color:var(--ac)">Datos base cargados</span></div></div>
  <div style="display:flex;gap:8px;align-items:center">
    <label class="btn-load" onclick="document.getElementById('fileIn').click()">📂 Cargar Excel Master</label>
    <input type="file" id="fileIn" accept=".xlsx,.xls" style="display:none" onchange="loadExcel(this.files[0])">
    <button class="btn-sm" onclick="exportCSV()">📥 CSV</button>
  </div>
</div>
<div class="params-bar">
  <div><label>TC USD/ARS</label><br><input type="number" id="pTC" value="1490" onchange="recalc()"></div>

  <div class="sep"></div>
  <div><label>GF USD/kg</label><br><input type="number" id="pGF" value="1.1547" step="0.01" onchange="recalc()"></div>
  <div><label>MOD+E+L USD/kg</label><br><input type="number" id="pMOD" value="0.5945" step="0.01" onchange="recalc()"></div>
  <div><label>Flete USD/kg</label><br><input type="number" id="pFL" value="0.20" step="0.01" onchange="recalc()"></div>
  <div class="sep"></div>
  <div><label>Imp Directos %</label><br><input type="number" id="pIMP" value="5.812" step="0.1" onchange="recalc()"></div>
  <div><label>Financieros USD/kg</label><br><input type="number" id="pFIN" value="0.4768" step="0.01" onchange="recalc()"></div>
  <div><label>TNA %</label><br><input type="number" id="pTNA" value="35" step="1" onchange="recalc()"></div>
</div>
<div class="tabs" id="tabs"></div>
<div class="content" id="content"></div>

var currentTab="resumen";
var tabNames=[{id:"resumen",label:"Resumen Ejecutivo"},{id:"lineas",label:"Por Línea"},{id:"productos",label:"Por Producto"},{id:"alertas",label:"Alertas"},{id:"pricing",label:"Pricing Estratégico"},{id:"simulador",label:"Simulador"},{id:"unitario",label:"Vista Unitaria"}];

function gp(id){return parseFloat(document.getElementById(id).value)||0}

function calc(p){
  var pv=p.pv, mp=p.mp, r=p.r||1;
  var mod=gp('pMOD'), fl=gp('pFL'), gf=gp('pGF');
  var impPct=gp('pIMP')/100;
  var imp=pv*impPct;
  var cmg=pv-mp/r-mod-imp-fl;
  var cmgPct=pv>0?cmg/pv:0;
  var ebitda=cmg-gf;
  var ebitdaPct=pv>0?ebitda/pv:0;
  var am=p.am||0;
  var ebit=ebitda-am;
  var ifin=gp('pFIN');
  var cfi=p.cfi||0;
  var rai=ebit-ifin-cfi;
  var rev=pv*p.v;
  var ebitdaAbs=ebitda*p.v;
  var cmgAbs=cmg*p.v;
  return {pv:pv,mp:mp,r:r,mod:mod,imp:imp,fl:fl,cmg:cmg,cmgPct:cmgPct,gf:gf,ebitda:ebitda,ebitdaPct:ebitdaPct,am:am,ebit:ebit,ifin:ifin,cfi:cfi,rai:rai,rev:rev,ebitdaAbs:ebitdaAbs,cmgAbs:cmgAbs,v:p.v,l:p.l,p:p.p};
}

function calcAll(){
  var r=[];for(var i=0;i<P.length;i++)r.push(calc(P[i]));return r;
}

function totals(items){
  var rev=0,ebitda=0,cmg=0,vol=0,np=0,nn=0;
  for(var i=0;i<items.length;i++){var c=items[i];rev+=c.rev;ebitda+=c.ebitdaAbs;cmg+=c.cmgAbs;vol+=c.v;if(c.ebitda>0)np++;else nn++;}
  return {rev:rev,ebitda:ebitda,cmg:cmg,vol:vol,margin:rev>0?(ebitda/rev*100).toFixed(1):'0',cmgMargin:rev>0?(cmg/rev*100).toFixed(1):'0',n:items.length,np:np,nn:nn};
}

function fmt(n){return Math.abs(n).toLocaleString("es-AR",{maximumFractionDigits:0})}
function fd(n){return n.toFixed(2)}
function pct(n){return(n*100).toFixed(1)+"%"}

function recalc(){renderContent()}

function renderTabs(){
  var h="";for(var i=0;i<tabNames.length;i++){var t=tabNames[i];h+='<div class="tab'+(currentTab===t.id?' active':'')+'" data-tab="'+t.id+'">'+t.label+'</div>';}
  document.getElementById("tabs").innerHTML=h;
  var els=document.getElementById("tabs").getElementsByClassName("tab");
  for(var j=0;j<els.length;j++)els[j].addEventListener("click",function(){currentTab=this.getAttribute("data-tab");renderTabs();renderContent()});
}

function renderContent(){
  if(currentTab==="resumen")renderResumen();
  else if(currentTab==="lineas")renderLineas();
  else if(currentTab==="productos")renderProductos();
  else if(currentTab==="alertas")renderAlertas();
  else if(currentTab==="pricing")renderPricing();
  else if(currentTab==="simulador")renderSimulador();
  else if(currentTab==="unitario")renderUnitario();
}

  h+='</tbody></table></div>';

  h+='<div class="card"><h3>Top 10 con Pérdida</h3><table><thead><tr><th>Línea</th><th>Producto</th><th style="text-align:right">Pérdida USD</th><th>Margen</th><th>Vol</th></tr></thead><tbody>';
  for(var i=0;i<losers.length;i++){var c=losers[i];h+='<tr><td style="font-size:10px;color:var(--t2)">'+c.l+'</td><td style="font-weight:500">'+c.p+'</td><td class="mono neg" style="text-align:right">('+fmt(c.ebitdaAbs)+')</td><td class="mono neg">'+pct(c.ebitdaPct)+'</td><td class="mono">'+fmt(c.v)+'</td></tr>';}
  h+='</tbody></table></div></div>';

  // By line summary
  var lines={};for(var i=0;i<all.length;i++){var c=all[i];var l=c.l||'OTROS';if(!lines[l])lines[l]={rev:0,ebitda:0,cmg:0,vol:0,n:0,np:0};lines[l].rev+=c.rev;lines[l].ebitda+=c.ebitdaAbs;lines[l].cmg+=c.cmgAbs;lines[l].vol+=c.v;lines[l].n++;if(c.ebitda>0)lines[l].np++;}
  var lk=Object.keys(lines).sort(function(a,b){return lines[b].rev-lines[a].rev});

  h+='</tbody></table></div>';
  document.getElementById("content").innerHTML=h;

function doFP(){
  var all=calcAll();
  var fl=document.getElementById("filter-l").value;
  var fs=document.getElementById("search-p").value.toLowerCase();
  var so=document.getElementById("sort-p").value;
  var items=all.filter(function(c){if(fl!=="ALL"&&c.l!==fl)return false;if(fs&&(c.p+c.l).toLowerCase().indexOf(fs)<0)return false;return true;});
  if(so==="revenue")items.sort(function(a,b){return b.rev-a.rev});
  else if(so==="ebitda")items.sort(function(a,b){return b.ebitdaAbs-a.ebitdaAbs});
  else if(so==="margin")items.sort(function(a,b){return b.ebitdaPct-a.ebitdaPct});

function doFPR(){
  var all=calcAll();
  var fl_v=document.getElementById("pr-l").value;
  var st=document.getElementById("pr-st").value;
  var fs=document.getElementById("pr-s").value.toLowerCase();
  var mod=gp('pMOD'),fl=gp('pFL'),gf=gp('pGF'),impPct=gp('pIMP')/100;

  var items=[];
  for(var i=0;i<all.length;i++){
    var c=all[i];if(c.v<=0)continue;
    if(fl_v!=="ALL"&&c.l!==fl_v)continue;
    if(fs&&(c.p+c.l).toLowerCase().indexOf(fs)<0)continue;
    var costBase=(c.mp/c.r)+mod+fl+gf;
    var pBE=costBase/(1-impPct);
    if(st==="BAJO"&&c.pv>=pBE)continue;
    if(st==="OK"&&c.pv<pBE)continue;
    var p10=pBE*1.10;var p20=pBE*1.20;
    var e10=p10-(c.mp/c.r)-mod-p10*impPct-fl-gf;
    var e20=p20-(c.mp/c.r)-mod-p20*impPct-fl-gf;
    var gap=c.pv-pBE;
    items.push({l:c.l,p:c.p,pv:c.pv,ebitda:c.ebitda,pBE:pBE,p10:p10,e10:e10,p20:p20,e20:e20,gap:gap,v:c.v,ebitdaAbs:c.ebitdaAbs});
  }
  items.sort(function(a,b){return a.gap-b.gap});

  var h='<table><thead><tr>';
  h+='<th>Línea</th><th>Producto</th>';
  h+='<th style="text-align:right">Precio Actual</th><th style="text-align:right">EBITDA Actual</th>';
  h+='<th style="text-align:right;color:var(--or)">P. Breakeven</th>';
  h+='<th style="text-align:right;color:var(--ac)">P. +10%</th><th style="text-align:right;color:var(--ac)">EBITDA +10%</th>';
  h+='<th style="text-align:right;color:var(--gn)">P. +20%</th><th style="text-align:right;color:var(--gn)">EBITDA +20%</th>';
  h+='<th style="text-align:right">Gap vs BE</th><th>Vol</th><th>Status</th>';
  h+='</tr></thead><tbody>';

  for(var i=0;i<items.length;i++){
    var c=items[i];
    var gapColor=c.gap>=0?'var(--gn)':'var(--rd)';
    var tag=c.gap>=c.pBE*0.2?'<span class="tag tag-ok">≥+20%</span>':c.gap>=c.pBE*0.1?'<span class="tag tag-ok">≥+10%</span>':c.gap>=0?'<span class="tag tag-warn">≥BE</span>':'<span class="tag tag-bad">BAJO BE</span>';
    var rowBg=c.gap<0?'background:rgba(255,77,106,.04);':'';
    h+='<tr style="'+rowBg+'">';
    h+='<td style="font-size:10px;color:var(--t2)">'+c.l+'</td>';
    h+='<td style="font-weight:500">'+c.p+'</td>';
    h+='<td class="mono" style="text-align:right">'+fd(c.pv)+'</td>';
    h+='<td class="mono" style="text-align:right;color:'+(c.ebitda>=0?'var(--gn)':'var(--rd)')+'">'+fd(c.ebitda)+'</td>';
    h+='<td class="mono" style="text-align:right;color:var(--or);font-weight:600">'+fd(c.pBE)+'</td>';
    h+='<td class="mono" style="text-align:right;color:var(--ac)">'+fd(c.p10)+'</td>';
    h+='<td class="mono" style="text-align:right;color:var(--ac)">'+fd(c.e10)+'</td>';
    h+='<td class="mono" style="text-align:right;color:var(--gn)">'+fd(c.p20)+'</td>';
    h+='<td class="mono" style="text-align:right;color:var(--gn)">'+fd(c.e20)+'</td>';
    h+='<td class="mono" style="text-align:right;color:'+gapColor+'">'+(c.gap>=0?'+':'')+fd(c.gap)+'</td>';
    h+='<td class="mono">'+fmt(c.v)+'</td>';
    h+='<td>'+tag+'</td>';
    h+='</tr>';
  }
  h+='</tbody></table>';
  document.getElementById("pr-tbl").innerHTML=h;
}

function simU(i,val){
  var c=window._sim[i];var np=val/100;window._sp[i]=np;
  document.getElementById("sp"+i).textContent=fd(np);
  var ne=c.ebitda+(np-c.pv);var nt=ne*c.v;var delta=nt-c.ebitdaAbs;
  var el=document.getElementById("se"+i);el.textContent=fd(ne);el.style.color=ne>=0?"var(--gn)":"var(--rd)";
  var tl=document.getElementById("st"+i);tl.textContent=fmt(nt);tl.style.color=nt>=0?"var(--gn)":"var(--rd)";
  var dl=document.getElementById("sd"+i);dl.textContent=(delta>=0?"+":"")+fmt(delta);dl.style.color=delta>=0?"var(--gn)":"var(--rd)";
  var td=0;for(var j=0;j<window._sim.length;j++){var sp=window._sim[j];var snp=window._sp[j];td+=(sp.ebitda+(snp-sp.pv))*sp.v-sp.ebitdaAbs;}
  var tAll=calcAll();var tTot=totals(tAll);var nw=tTot.ebitda+td;
  var te=document.getElementById("simTE");te.textContent="USD "+(nw<0?"-":"")+fmt(nw);te.style.color=nw>=0?"var(--gn)":"var(--rd)";
  var tdd=document.getElementById("simTD");tdd.textContent="USD "+(td>=0?"+":"")+fmt(td);tdd.style.color=td>=0?"var(--gn)":"var(--rd)";
}

function doFU(){
  var all=calcAll();var fl=document.getElementById("u-l").value;var st=document.getElementById("u-st").value;var fs=document.getElementById("u-s").value.toLowerCase();
  var items=all.filter(function(c){if(c.v<=0)return false;if(fl!=="ALL"&&c.l!==fl)return false;if(st==="POS"&&c.ebitda<=0)return false;if(st==="NEG"&&c.ebitda>0)return false;if(fs&&(c.p+c.l).toLowerCase().indexOf(fs)<0)return false;return true;}).sort(function(a,b){return b.rev-a.rev});
  var maxP=0;for(var i=0;i<items.length;i++)if(items[i].pv>maxP)maxP=items[i].pv;
  var gf=gp('pGF');
  var h='<table><thead><tr><th>Línea</th><th>Producto</th><th style="text-align:right">Precio</th><th style="text-align:right">MP/R</th><th style="text-align:right">MOD</th><th style="text-align:right">Imp+Fl</th><th style="text-align:right">CMG</th><th>CMG%</th><th style="text-align:right">GF</th><th style="text-align:right">EBITDA</th><th>%</th><th>Waterfall</th></tr></thead><tbody>';
  for(var i=0;i<items.length;i++){var c=items[i];var mpr=c.mp/c.r;var bw=maxP>0?100:0;
  var mpW=mpr/maxP*bw;var modW=c.mod/maxP*bw;var impW=(c.imp+c.fl)/maxP*bw;var gfW=gf/maxP*bw;
  var eW=c.ebitda>0?c.ebitda/maxP*bw:0;var lW=c.ebitda<0?Math.min(Math.abs(c.ebitda)/maxP*bw,15):0;
  var ec=c.ebitdaPct>0.1?'var(--gn)':c.ebitdaPct>0?'var(--or)':'var(--rd)';
  h+='<tr style="cursor:pointer" onclick="showUD('+i+')">';
  h+='<td style="font-size:10px;color:var(--t2)">'+c.l+'</td><td style="font-weight:500">'+c.p+'</td>';
  h+='<td class="mono" style="text-align:right">'+fd(c.pv)+'</td><td class="mono neg" style="text-align:right">'+fd(mpr)+'</td>';
  h+='<td class="mono" style="text-align:right;color:var(--t2)">'+fd(c.mod)+'</td>';
  h+='<td class="mono" style="text-align:right;color:var(--t2)">'+fd(c.imp+c.fl)+'</td>';
  h+='<td class="mono" style="text-align:right;color:'+ec+'">'+fd(c.cmg)+'</td><td class="mono" style="color:'+ec+'">'+pct(c.cmgPct)+'</td>';
  h+='<td class="mono warn" style="text-align:right">'+fd(gf)+'</td>';
  h+='<td class="mono" style="text-align:right;color:'+ec+'">'+fd(c.ebitda)+'</td><td class="mono" style="color:'+ec+'">'+pct(c.ebitdaPct)+'</td>';
  h+='<td><div style="display:flex;height:10px;border-radius:2px;overflow:hidden;width:'+bw+'px;background:var(--bd)">';
  h+='<div style="width:'+mpW+'px;background:var(--rd);opacity:.7"></div><div style="width:'+modW+'px;background:var(--or);opacity:.7"></div><div style="width:'+impW+'px;background:var(--pu);opacity:.5"></div><div style="width:'+gfW+'px;background:var(--t2);opacity:.5"></div>';
  if(c.ebitda>0)h+='<div style="width:'+eW+'px;background:var(--gn)"></div>';else h+='<div style="width:'+lW+'px;background:var(--rd);opacity:.3"></div>';
  h+='</div></td></tr>';}
  h+='</tbody></table>';
  document.getElementById("u-tbl").innerHTML=h;window._ui=items;
}

function showUD(idx){
  var c=window._ui[idx];var mpr=c.mp/c.r;var gf=gp('pGF');
  var h='<h3>'+c.p+'</h3><div style="font-size:11px;color:var(--t2);margin-bottom:8px">'+c.l+' · Rendimiento: '+c.r+'</div><div style="margin-top:10px">';
  h+='<div class="sr" style="padding:6px 0"><span class="lb" style="font-size:13px">Precio de Venta</span><span class="vl" style="font-size:15px">USD '+fd(c.pv)+' /kg</span></div>';
  h+='<div class="sr" style="padding:3px 0;padding-left:12px"><span class="lb">(-) MP+ME / Rend</span><span class="vl neg">USD '+fd(mpr)+'</span></div>';
  h+='<div class="sr" style="padding:3px 0;padding-left:12px"><span class="lb">(-) MOD+Energía</span><span class="vl" style="color:var(--t2)">USD '+fd(c.mod)+'</span></div>';
  h+='<div class="sr" style="padding:3px 0;padding-left:12px"><span class="lb">(-) Impuestos ('+gp('pIMP')+'%)</span><span class="vl" style="color:var(--t2)">USD '+fd(c.imp)+'</span></div>';
  h+='<div class="sr" style="padding:3px 0;padding-left:12px"><span class="lb">(-) Flete</span><span class="vl" style="color:var(--t2)">USD '+fd(c.fl)+'</span></div>';
  h+='<div style="border-top:2px solid var(--bd);margin:6px 0"></div>';
  h+='<div class="sr" style="padding:6px 0"><span class="lb" style="font-weight:700">= CMG</span><span class="vl" style="color:'+(c.cmg>=0?'var(--gn)':'var(--rd)')+';font-size:15px">USD '+fd(c.cmg)+' /kg</span></div>';
  h+='<div class="sr" style="padding:3px 0;padding-left:12px"><span class="lb">(-) Gastos Fijos</span><span class="vl warn">USD '+fd(gf)+'</span></div>';
  h+='<div style="border-top:3px solid var(--ac);margin:6px 0"></div>';
  h+='<div class="sr" style="padding:6px 0"><span class="lb" style="font-weight:700;font-size:14px">= EBITDA</span><span class="vl" style="color:'+(c.ebitda>=0?'var(--gn)':'var(--rd)')+';font-size:18px">USD '+fd(c.ebitda)+' /kg</span></div>';
  h+='<div style="border-top:1px solid var(--bd);margin:6px 0"></div>';
  h+='<div class="sr"><span class="lb">Volumen anual</span><span class="vl">'+fmt(c.v)+' kg</span></div>';
  h+='<div class="sr"><span class="lb">Revenue anual</span><span class="vl">USD '+fmt(c.rev)+'</span></div>';
  h+='<div class="sr"><span class="lb">EBITDA anual</span><span class="vl" style="color:'+(c.ebitdaAbs>=0?'var(--gn)':'var(--rd)')+'">USD '+(c.ebitdaAbs<0?'-':'')+fmt(c.ebitdaAbs)+'</span></div>';
  if(c.ebitda<0)h+='<div style="margin-top:8px;padding:8px;background:rgba(255,77,106,.1);border-radius:6px;font-size:11px;color:var(--rd)">Para breakeven: USD '+fd(c.pv-c.ebitda)+'/kg (+'+fd(Math.abs(c.ebitda))+')</div>';
  h+='</div>';
  document.getElementById("u-det").innerHTML=h;
}

function loadExcel(file){
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:0,raw:true});
      if(rows.length<2)throw new Error('Archivo vacío');
      var hdrs=rows[0].map(function(h){return String(h||'').toLowerCase().trim()});
      var cm={};
      hdrs.forEach(function(h,i){
        if(h.includes('línea')||h.includes('linea'))cm.l=i;
        else if(h.includes('producto'))cm.p=i;
        else if(h.includes('precio'))cm.pv=i;
        else if(h.includes('mp+me')||h.includes('mp y envase')||h.includes('mp_me'))cm.mp=i;
        else if(h.includes('rendimiento'))cm.r=i;
        else if(h.includes('vol'))cm.v=i;
        else if(h.includes('mod'))cm.mod=i;
        else if(h.includes('amort'))cm.am=i;
        else if(h.includes('cf inv')||h.includes('costo fin'))cm.cfi=i;
      });
      var newP=[];
      for(var r=1;r<rows.length;r++){
        var row=rows[r];
        var prod=String(row[cm.p]||'').trim();
        if(!prod)continue;
        var pf=function(v){var n=parseFloat(v);return isNaN(n)?0:Math.abs(n)};
        newP.push({l:String(row[cm.l]||'').trim(),p:prod,pv:pf(row[cm.pv]),mp:pf(row[cm.mp]),r:pf(row[cm.r])||1,v:pf(row[cm.v]),mod:cm.mod!==undefined?pf(row[cm.mod]):gp('pMOD'),am:cm.am!==undefined?pf(row[cm.am]):0,ifin:0,cfi:cm.cfi!==undefined?pf(row[cm.cfi]):0,imp:0,fl:0});
      }
      if(newP.length>0){P=newP;document.getElementById('dataSource').textContent='Excel cargado: '+file.name+' ('+newP.length+' productos)';document.getElementById('dataSource').style.color='var(--gn)';renderContent();}
    }catch(err){alert('Error: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}

function exportCSV(){
  var all=calcAll();var gf=gp('pGF');
  var csv='Línea,Producto,Precio,MP+ME,Rendimiento,MP/R,MOD,Imp,Flete,CMG,CMG%,GF,EBITDA,EBITDA%,Vol,Revenue,EBITDA Total\n';
  for(var i=0;i<all.length;i++){var c=all[i];csv+='"'+c.l+'","'+c.p+'",'+fd(c.pv)+','+c.mp.toFixed(4)+','+c.r+','+(c.mp/c.r).toFixed(4)+','+fd(c.mod)+','+fd(c.imp)+','+fd(c.fl)+','+fd(c.cmg)+','+(c.cmgPct*100).toFixed(1)+','+fd(gf)+','+fd(c.ebitda)+','+(c.ebitdaPct*100).toFixed(1)+','+c.v+','+c.rev.toFixed(0)+','+c.ebitdaAbs.toFixed(0)+'\n';}
  var b=new Blob([csv],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='RECSA_PL_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

renderTabs();renderContent();
</script>
