<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECSA — Dashboard Integral P&L</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--s1:#111827;--s2:#1a2235;--bd:#2a3450;--tx:#e8ecf4;--t2:#8899b4;--ac:#4f8cff;--gn:#00d4aa;--rd:#ff4d6a;--or:#ffb84d;--pu:#a78bfa}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx)}
.header{background:linear-gradient(135deg,#0d1117,#1a2235);border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.header h1{font-size:20px;font-weight:700}.header h1 span{color:var(--ac)}
.header .sub{color:var(--t2);font-size:11px;margin-top:2px}
.params-bar{display:flex;gap:16px;padding:8px 24px;background:var(--s2);border-bottom:1px solid var(--bd);align-items:center;flex-wrap:wrap}
.params-bar label{font-size:10px;color:var(--t2)}
.params-bar input[type=number]{width:72px;background:var(--s1);border:1px solid var(--bd);color:var(--ac);padding:3px 6px;border-radius:4px;font-family:'JetBrains Mono';font-size:11px;text-align:right}
.params-bar .sep{width:1px;height:20px;background:var(--bd)}
.tabs{display:flex;gap:0;background:var(--s1);border-bottom:1px solid var(--bd);padding:0 24px;overflow-x:auto}
.tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--tx)}.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.tab.sec{color:var(--or)}.tab.sec.active{color:var(--or);border-bottom-color:var(--or)}
.content{padding:20px;max-width:1500px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px;text-align:center}
.kpi .lb{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:1px}
.kpi .vl{font-family:'JetBrains Mono';font-size:18px;font-weight:600;margin-top:4px}
.kpi .delta{font-size:10px;margin-top:3px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:16px}
.card h3{font-size:13px;color:var(--or);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.card.full{grid-column:1/-1}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:var(--s1);color:var(--t2);padding:7px 8px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;z-index:1}
td{padding:4px 8px;border-bottom:1px solid rgba(42,52,80,.4)}
tr:hover{background:rgba(79,140,255,.03)}
.mono{font-family:'JetBrains Mono';font-size:11px}
.neg{color:var(--rd)}.pos{color:var(--gn)}.warn{color:var(--or)}
.tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600}
.tag-ok{background:rgba(0,212,170,.15);color:var(--gn)}
.tag-bad{background:rgba(255,77,106,.15);color:var(--rd)}
.tag-warn{background:rgba(255,184,77,.15);color:var(--or)}
.sr{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.sr .lb{color:var(--t2)}.sr .vl{font-family:'JetBrains Mono';font-weight:600}
.btn-sm{padding:5px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-family:'DM Sans';font-size:11px;cursor:pointer}
.btn-sm:hover{border-color:var(--ac);color:var(--ac)}
.btn-load{padding:5px 12px;border-radius:6px;border:1px solid var(--ac);background:rgba(79,140,255,.1);color:var(--ac);font-family:'DM Sans';font-size:11px;font-weight:600;cursor:pointer}
.btn-load:hover{background:var(--ac);color:#fff}
.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filters select,.filters input{background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:5px 10px;border-radius:6px;font-family:'DM Sans';font-size:11px}
.filters input[type=text]{flex:1;min-width:120px}
input[type=range]{width:60px;height:4px;-webkit-appearance:none;background:var(--bd);border-radius:2px;outline:none;cursor:pointer;vertical-align:middle}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--ac);border-radius:50%;cursor:pointer}
.pv{font-family:'JetBrains Mono';font-size:10px;color:var(--ac);min-width:28px;display:inline-block;text-align:right}
.sidebar{background:var(--s1);border-left:1px solid var(--bd);padding:16px;overflow-y:auto}
.sidebar h3{font-size:13px;margin-bottom:12px;color:var(--or)}
.main-2col{display:grid;grid-template-columns:1fr 300px;min-height:calc(100vh - 200px)}
.bar{height:7px;background:var(--bd);border-radius:4px;margin-top:6px;overflow:hidden;display:flex}
.bar .s{height:100%;transition:width .3s}
.s1{background:var(--ac)}.s2{background:var(--gn)}.s3{background:var(--or)}.s4{background:var(--pu)}
.legend{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--t2)}
.legend i{width:7px;height:7px;border-radius:2px;display:inline-block}
.alert-box{background:rgba(255,77,106,.08);border:1px solid rgba(255,77,106,.25);border-radius:8px;padding:10px;margin-top:10px}
.alert-box h4{color:var(--rd);font-size:11px;margin-bottom:4px}
.alert-box p{font-size:10px;color:var(--t2);padding:1px 0}
@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}.main-2col{grid-template-columns:1fr}}
</style>
</head>

// Restaurar pGF/pMOD desde localStorage al iniciar
// Helper: volumen mensual real del negocio (suma de productos / 12)
// Es la ÚNICA fuente de verdad de volumen del dashboard. Usado por:
//   - KPI "Volumen Anual" del Resumen (Σ p.v)
//   - loadGastos (Asig. Gastos) → para calcular GF/kg y MOD/kg desde gastos en ARS
//   - cotCalcular (Cotizador) → volumen base para absorción incremental
//   - input hidden pVol (sincronizado al cargar y al recalcular)
function getVolMensualReal(){
  var total = 0;
  for(var i=0;i<P.length;i++) total += (P[i].v || 0);
  return total / 12;
}
// Sincronizar input hidden y display al iniciar
(function(){
  try{
    var v = getVolMensualReal();
    var inp = document.getElementById('pVol');
    if(inp) inp.value = Math.round(v);
    var disp = document.getElementById('pVoldisplay');
    if(disp) disp.textContent = Math.round(v).toLocaleString('es-AR');
  }catch(e){}
})();
function restoreGastosPersisted(){
  try{
    var savedGF=localStorage.getItem('recsa_pGF');
    var savedMOD=localStorage.getItem('recsa_pMOD');
    var savedBACK=localStorage.getItem('recsa_pBACK');
    var savedFecha=localStorage.getItem('recsa_gastos_fecha');
    var gfNum=parseFloat(savedGF);
    var modNum=parseFloat(savedMOD);
    // Solo restaurar si AMBOS son números válidos y POSITIVOS (no ceros, no NaN)
    if(savedGF&&savedMOD&&!isNaN(gfNum)&&!isNaN(modNum)&&gfNum>0&&modNum>0){
      var gfEl=document.getElementById('pGF');
      var modEl=document.getElementById('pMOD');
      if(gfEl)gfEl.value=savedGF;
      if(modEl)modEl.value=savedMOD;
      var gfd=document.getElementById('pGFdisplay');
      var modd=document.getElementById('pMODdisplay');
      if(gfd)gfd.textContent=savedGF;
      if(modd)modd.textContent=savedMOD;
      // Back Office (si fue persistido)
      var backNum=parseFloat(savedBACK);
      if(savedBACK&&!isNaN(backNum)&&backNum>0){
        var backEl=document.getElementById('pBACK');
        if(backEl)backEl.value=savedBACK;
        var backd=document.getElementById('pBACKdisplay');
        if(backd)backd.textContent=savedBACK;
      }
      return savedFecha;
    } else if(savedGF!==null||savedMOD!==null){
      // Auto-purga: hay basura guardada (valores 0, vacíos o inválidos) → limpiar
      localStorage.removeItem('recsa_pGF');
      localStorage.removeItem('recsa_pMOD');
      localStorage.removeItem('recsa_pBACK');
      localStorage.removeItem('recsa_gastos_fecha');
    }
  }catch(e){}
  return null;
}
function clearGastosPersisted(){
  try{
    localStorage.removeItem('recsa_pGF');
    localStorage.removeItem('recsa_pMOD');
    localStorage.removeItem('recsa_gastos_fecha');
    // No tocar pGF/pMOD en el DOM aquí: location.reload() los volverá a su valor default del HTML
    alert('Valores de gastos eliminados. Cargá un archivo nuevo.');
    location.reload();
  }catch(e){alert('Error al limpiar: '+e.message);}
}
function formatFechaGastos(iso){
  if(!iso)return '';
  try{var d=new Date(iso);return d.toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});}catch(e){return iso;}
}

// ===== P&L CALCULATIONS =====
// HELPERS ÚNICOS — fuente de verdad de las fórmulas (evitan duplicación entre tabs)
// IMPORTANTE: el mp del array P (de "COSTOS MP Y ENVASE") YA incluye el rendimiento,
// por eso NO se divide por r. El campo r queda como informativo.
function getMPME(p){ return p.mp; }                 // costo insumo (ya incluye rendimiento)
function getCostoVar(){                              // costos variables fijos por kg (sin insumo ni imp)
  return gp('pMOD')+gp('pFL');                       // MOD+Energía+Logística + Flete
}
function getCostoBase(p){                            // costo total variable de un producto (sin impuestos)
  return getMPME(p)+gp('pMOD')+gp('pFL');
}
function getGastosFijosKg(){ return gp('pGF')+gp('pBACK'); }  // Fijos + Back Office
function getEbitdaUnit(pv,p,gfKg){                   // EBITDA/kg dado un precio y un GF/kg
  var imp=pv*(gp('pIMP')/100);
  return pv-getMPME(p)-gp('pMOD')-imp-gp('pFL')-gfKg;
}
function calcPL(p){
  var pv=p.pv, mp=p.mp, r=p.r||1;
  var mod=gp('pMOD'), fl=gp('pFL'), gf=gp('pGF'), back=gp('pBACK');
  var impPct=gp('pIMP')/100;
  var imp=pv*impPct;
  // Si falta pv real (SIN_DATO) o falta mp → no calcular CMG/EBITDA
  var sinDato = (p.pvo==='SIN_DATO') || (mp===0);
  var cmg = sinDato ? null : (pv-getMPME(p)-mod-imp-fl);
  var cmgPct = (cmg!==null && pv>0) ? cmg/pv : null;
  var ebitda = sinDato ? null : (cmg-gf-back);
  var ebitdaPct = (ebitda!==null && pv>0) ? ebitda/pv : null;
  var am=p.am||0;
  var ebit = ebitda===null ? null : (ebitda-am);
  var tna=gp('pTNA')/100;
  var sd=p.lt+p.ss;
  var sk=p.v>0?(p.v/365)*sd:0;
  var su=sk*mp;
  var cfi=p.v>0?(su*tna)/(p.v*365)*sd:0;
  var ifin=gp('pFIN');
  var otrosImp=gp('pOTROSIMP');
  var rai = ebit===null ? null : (ebit-ifin-cfi-otrosImp);
  var rev=pv*p.v;
  var ebitdaAbs = (ebitda===null) ? 0 : (ebitda*p.v);
  var cmgAbs = (cmg===null) ? 0 : (cmg*p.v);
  return {l:p.l,p:p.p,pv:p.pv,pvo:p.pvo||'REAL',mp:mp,r:r,v:p.v,o:p.o,lt:p.lt,ss:p.ss,mod:mod,fl:fl,gf:gf,back:back,imp:imp,cmg:cmg,cmgPct:cmgPct,ebitda:ebitda,ebitdaPct:ebitdaPct,am:am,ebit:ebit,sk:sk,su:su,cfi:cfi,ifin:ifin,otrosImp:otrosImp,rai:rai,rev:rev,ebitdaAbs:ebitdaAbs,cmgAbs:cmgAbs,sinDato:sinDato};
}
function calcAllPL(){var r=[];for(var i=0;i<P.length;i++)r.push(calcPL(P[i]));return r;}
function totalsPL(items){var rev=0,ebitda=0,cmg=0,vol=0,np=0,nn=0;for(var i=0;i<items.length;i++){var c=items[i];rev+=c.rev;ebitda+=c.ebitdaAbs;cmg+=c.cmgAbs;vol+=c.v;if(c.ebitda>0)np++;else nn++;}return{rev:rev,ebitda:ebitda,cmg:cmg,vol:vol,margin:rev>0?(ebitda/rev*100).toFixed(1):'0',cmgMargin:rev>0?(cmg/rev*100).toFixed(1):'0',n:items.length,np:np,nn:nn};}

// ===== INVENTORY CALCULATIONS =====
function calcInv(p){
  var mp=p.mp||0, mod=gp('pMOD'), fl=gp('pFL'), tna=gp('pTNA')/100;
  var sk=p.sk||0;                          // kilos en stock (manual, default 0)
  var cd=mp+mod+fl;                        // costo directo total
  var valor=(mp>0&&sk>0)?(sk*cd):null;     // valor stock (null si falta dato)
  var dias=(sk>0&&p.v>0)?(sk/(p.v/365)):null;  // dias de stock segun vol anual 12m
  var cf=(valor!==null&&dias!==null)?(valor*tna*(dias/365)):null; // costo financiero
  var cfPerKg=(cf!==null&&sk>0)?(cf/sk):null;
  var cfPct=(cf!==null&&mp>0)?(cf/(sk*mp)):null;
  return {sk:sk,sd:dias,su:valor||0,cfa:cf||0,cfs:cfPerKg||0,cfp:cfPct||0,valor:valor,dias:dias,cf:cf,cd:cd};
}

function fmt(n){return Math.abs(n).toLocaleString("es-AR",{maximumFractionDigits:0})}
function fd(n){if(n===null||n===undefined)return '—';return n.toFixed(2);}
function pct(n){if(n===null||n===undefined)return '—';return (n*100).toFixed(1)+'%';}

}

function simU(i,val){var c=window._sim[i];var np=val/100;window._sp[i]=np;document.getElementById("sp"+i).textContent=fd(np);var ne=c.ebitda+(np-c.pv);var nt=ne*c.v;var d=nt-c.ebitdaAbs;document.getElementById("se"+i).textContent=fd(ne);document.getElementById("se"+i).style.color=ne>=0?"var(--gn)":"var(--rd)";document.getElementById("st"+i).textContent=fmt(nt);document.getElementById("st"+i).style.color=nt>=0?"var(--gn)":"var(--rd)";document.getElementById("sd"+i).textContent=(d>=0?"+":"")+fmt(d);document.getElementById("sd"+i).style.color=d>=0?"var(--gn)":"var(--rd)";var td=0;for(var j=0;j<window._sim.length;j++){var sp=window._sim[j];td+=(sp.ebitda+(window._sp[j]-sp.pv))*sp.v-sp.ebitdaAbs;}var t=totalsPL(calcAllPL());var nw=t.ebitda+td;document.getElementById("simTE").textContent="USD "+(nw<0?"-":"")+fmt(nw);document.getElementById("simTE").style.color=nw>=0?"var(--gn)":"var(--rd)";document.getElementById("simTD").textContent="USD "+(td>=0?"+":"")+fmt(td);document.getElementById("simTD").style.color=td>=0?"var(--gn)":"var(--rd)";}

  for(var i=0;i<lks.length;i++)h+='<option>'+lks[i]+'</option>';
  h+='</select><select id="u-st" onchange="doFU()" style="background:var(--s1);border:1px solid var(--bd);color:var(--tx);padding:5px;border-radius:6px;font-size:11px"><option value="ALL">Todos</option><option value="POS">Rentables</option><option value="NEG">Pierde</option></select><input id="u-s" placeholder="Buscar..." oninput="doFU()" style="background:var(--s1);border:1px solid var(--bd);color:var(--tx);padding:5px;border-radius:6px;font-size:11px;flex:1"></div>';
  h+='<div id="u-tbl" style="max-height:calc(100vh - 350px);overflow-y:auto"></div></div>';

  document.getElementById("content").innerHTML=h;
  // Render avg
  var items=calcAllPL().filter(function(c){return c.v>0});var ap=0,am=0,tv=0;for(var i=0;i<items.length;i++){ap+=items[i].pv*items[i].v;am+=items[i].mp/items[i].r*items[i].v;tv+=items[i].v;}ap/=tv;am/=tv;var gf=gp('pGF'),mod=gp('pMOD'),fl=gp('pFL'),ip=gp('pIMP')/100;var acmg=ap-am-mod-ap*ip-fl;var ae=acmg-gf;
  var ah='<h3>Promedio Ponderado</h3><div class="sr"><span class="lb">Precio</span><span class="vl">USD '+ap.toFixed(2)+'</span></div><div class="sr"><span class="lb">(-) MP</span><span class="vl neg">'+am.toFixed(2)+'</span></div><div class="sr"><span class="lb">(-) MOD</span><span class="vl" style="color:var(--t2)">'+mod.toFixed(2)+'</span></div><div class="sr"><span class="lb">(-) Imp+Fl</span><span class="vl" style="color:var(--t2)">'+(ap*ip+fl).toFixed(2)+'</span></div><div style="border-top:1px solid var(--bd);margin:4px 0"></div><div class="sr"><span class="lb" style="font-weight:600">= CMG</span><span class="vl" style="color:'+(acmg>=0?'var(--gn)':'var(--rd)')+'">'+acmg.toFixed(2)+'</span></div><div class="sr"><span class="lb">(-) GF</span><span class="vl warn">'+gf.toFixed(2)+'</span></div><div style="border-top:2px solid var(--bd);margin:4px 0"></div><div class="sr"><span class="lb" style="font-weight:700">= EBITDA</span><span class="vl" style="color:'+(ae>=0?'var(--gn)':'var(--rd)')+';font-size:15px">USD '+ae.toFixed(2)+'</span></div>';
  document.getElementById("u-avg").innerHTML=ah;doFU();

function doFU(){
  var all=calcAllPL();var fl=document.getElementById("u-l").value;var st=document.getElementById("u-st").value;var fs=document.getElementById("u-s").value.toLowerCase();
  var items=all.filter(function(c){if(fl!=="ALL"&&c.l!==fl)return false;if(st==="POS"&&c.ebitda<=0)return false;if(st==="NEG"&&c.ebitda>0)return false;if(fs&&(c.p+c.l).toLowerCase().indexOf(fs)<0)return false;return true;}).sort(function(a,b){return b.rev-a.rev;});
  var maxP=0;for(var i=0;i<items.length;i++)if(items[i].pv>maxP)maxP=items[i].pv;var gf=gp('pGF')+gp('pBACK');
  var h='<table><thead><tr><th>Producto</th><th style="text-align:right">Precio</th><th style="text-align:right">MP</th><th style="text-align:right">CMG</th><th style="text-align:right">EBITDA</th><th>%</th><th>Waterfall</th></tr></thead><tbody>';
  for(var i=0;i<items.length;i++){var c=items[i];var mpr=c.mp;var bw=maxP>0?80:0;var mpW=mpr/maxP*bw;var modW=c.mod/maxP*bw;var impW=(c.imp+c.fl)/maxP*bw;var gfW=gf/maxP*bw;var eW=c.ebitda>0?c.ebitda/maxP*bw:0;var lW=c.ebitda<0?Math.min(Math.abs(c.ebitda)/maxP*bw,12):0;var ec=c.ebitdaPct>0.1?'var(--gn)':c.ebitdaPct>0?'var(--or)':'var(--rd)';
  h+='<tr style="cursor:pointer" onclick="showUD('+i+')"><td style="font-weight:500">'+c.p+'</td><td class="mono" style="text-align:right;'+(c.pvo==="BREAKEVEN"?"color:var(--t2);font-style:italic":"")+'">'+fd(c.pv)+(c.pvo==="BREAKEVEN"?' <span style=\"font-size:9px;color:var(--or)\">BE</span>':'')+'</td><td class="mono neg" style="text-align:right">'+fd(c.mp)+'</td><td class="mono" style="text-align:right;color:'+ec+'">'+fd(c.cmg)+'</td><td class="mono" style="text-align:right;color:'+ec+'">'+fd(c.ebitda)+'</td><td class="mono" style="color:'+ec+'">'+pct(c.ebitdaPct)+'</td><td><div style="display:flex;height:8px;border-radius:2px;overflow:hidden;width:'+bw+'px;background:var(--bd)"><div style="width:'+mpW+'px;background:var(--rd);opacity:.7"></div><div style="width:'+modW+'px;background:var(--or);opacity:.7"></div><div style="width:'+impW+'px;background:var(--pu);opacity:.5"></div><div style="width:'+gfW+'px;background:var(--t2);opacity:.5"></div>'+(c.ebitda>0?'<div style="width:'+eW+'px;background:var(--gn)"></div>':'<div style="width:'+lW+'px;background:var(--rd);opacity:.3"></div>')+'</div></td></tr>';}
  h+='</tbody></table>';document.getElementById("u-tbl").innerHTML=h;window._ui=items;
}

h+='<div class="sr"><span class="lb" style="font-weight:700;font-size:13px">= EBITDA</span><span class="vl" style="color:'+(c.ebitda>=0?'var(--gn)':'var(--rd)')+';font-size:16px">USD '+fd(c.ebitda)+' ('+(c.ebitdaPct*100).toFixed(0)+'%)</span></div>';

h+='<div style="border-top:1px solid var(--bd);margin:4px 0"></div>';

document.getElementById("u-det").innerHTML=h;}

function renderInventario(){
  var tna=gp('pTNA')/100;var tc=gp('pTC');
  var tsu=0,tcf=0,nc=0;
  for(var i=0;i<P.length;i++){var c=calcInv(P[i]);if(c.valor!==null)tsu+=c.valor;if(c.cf!==null)tcf+=c.cf;if((P[i].sk||0)>0)nc++;}
  var totalV=P.reduce(function(a,b){return a+(b.v||0)},0);

  var h='<div class="kpis" style="grid-template-columns:repeat(5,1fr)">';

  h+='<div class="kpi"><div class="lb">CF Mensual ARS</div><div class="vl neg">ARS '+fmt(tcf/12*tc)+'</div></div>';

  h+='<div class="card full"><h3>Inventario por Producto</h3><p style="color:var(--t2);font-size:10px;margin-bottom:10px">Kilos en stock se cargan via Excel de Costo Financiero (cuando este disponible). Costo Directo = mp + pMOD + pFL. Dias en base a vol movil 12m. CF anual usa TNA actual ('+gp('pTNA')+'%).</p>';

window._cotState = {productoP_idx: -1, volMensual: 1000, precio: 0};

function renderCotizador(){

  if(window._cotState.productoP_idx < 0){
    var sorted = P.slice().sort(function(a,b){

      if(a.l > b.l) return 1;
      return a.p < b.p ? -1 : 1;

    var prod0 = sorted[0];
    for(var k=0;k<P.length;k++) if(P[k] === prod0) {window._cotState.productoP_idx = k; break;}

  h += '</div>';
  
  // Lista filtrada de productos
  h += '<div id="cot-tbl" style="max-height:240px;overflow-y:auto;border:1px solid var(--bd);border-radius:6px;background:var(--c1)"></div>';

  h += '<div id="cotProductoInfo" style="margin-top:12px;font-size:12px;color:var(--t2)"></div>';

  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">';
  h += '<div>';
  h += '<label style="font-size:11px;color:var(--t2);display:block;margin-bottom:4px">Volumen del cliente (kg/mes)</label>';
  h += '<input type="number" id="cotVolumen" min="100" max="50000" step="100" value="'+window._cotState.volMensual+'" oninput="cotCalcular()" style="width:100%;padding:8px;background:var(--c1);color:var(--t1);border:1px solid var(--bd);border-radius:6px;font-size:13px;margin-bottom:8px">';
  h += '<input type="range" id="cotVolumenRange" min="100" max="20000" step="100" value="'+window._cotState.volMensual+'" oninput="cotVolFromRange()" style="width:100%">';
  h += '</div>';

  h += '<input type="number" id="cotPrecio" min="0.1" step="0.01" value="'+(window._cotState.precio || 0).toFixed(4)+'" oninput="cotCalcular()" style="width:100%;padding:8px;background:var(--c1);color:var(--t1);border:1px solid var(--bd);border-radius:6px;font-size:13px;margin-bottom:8px">';
  h += '<input type="range" id="cotPrecioRange" min="0" max="100" step="0.5" value="50" oninput="cotPrecioFromRange()" style="width:100%">';
  h += '</div>';

  h += '<button onclick="cotExportExcel()" style="padding:10px 20px;background:var(--ac);color:#000;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer">📊 Exportar Excel</button>';
  h += '<button onclick="cotReset()" style="padding:10px 20px;background:transparent;color:var(--t2);border:1px solid var(--t2);border-radius:6px;font-size:13px;cursor:pointer">🔄 Reset</button>';
  h += '</div>';
  h += '</div>';
  
  document.getElementById("content").innerHTML = h;

function cotDoFiltro(){
  var fl = document.getElementById('cot-l').value;
  var fs = document.getElementById('cot-s').value.toLowerCase();
  
  // Filtrar productos
  var items = [];
  for(var i=0;i<P.length;i++){
    var p = P[i];
    if(fl !== 'ALL' && p.l !== fl) continue;
    if(fs && (p.p + ' ' + p.l).toLowerCase().indexOf(fs) < 0) continue;
    items.push({idx: i, l: p.l, p: p.p, pv: p.pv, v: p.v});
  }
  // Ordenar por línea + producto
  items.sort(function(a,b){
    if(a.l < b.l) return -1;
    if(a.l > b.l) return 1;
    return a.p < b.p ? -1 : 1;
  });
  
  // Construir tabla
  var h = '<table style="width:100%;font-size:11px"><thead><tr style="background:var(--s1);position:sticky;top:0;z-index:1">';
  h += '';
  h += '<th style="padding:6px 8px;text-align:left;border-bottom:1px solid var(--bd);color:var(--t2)">Producto</th>';
  h += '<th style="padding:6px 8px;text-align:right;border-bottom:1px solid var(--bd);color:var(--t2)">Precio</th>';
  h += '<th style="padding:6px 8px;text-align:right;border-bottom:1px solid var(--bd);color:var(--t2)">Vol/año</th>';
  h += '</tr></thead><tbody>';
  for(var i=0;i<items.length;i++){
    var c = items[i];
    var sel = (c.idx === window._cotState.productoP_idx);
    var bgRow = sel ? 'background:rgba(135,206,235,0.18);' : '';
    h += '<tr style="cursor:pointer;'+bgRow+'border-bottom:1px solid var(--bd)" onclick="cotSelectProduct('+c.idx+')">';
    h += '';
    h += '<td style="padding:5px 8px;font-weight:'+(sel?'600':'400')+';color:'+(sel?'var(--ac)':'var(--tx)')+'">'+(sel?'▶ ':'')+c.p+'</td>';
    h += '<td style="padding:5px 8px;text-align:right;font-family:monospace">'+c.pv.toFixed(4)+'</td>';
    h += '<td style="padding:5px 8px;text-align:right;font-family:monospace;color:var(--t2)">'+(c.v ? Math.round(c.v).toLocaleString('es-AR') : '0')+'</td>';
    h += '</tr>';
  }
  if(items.length === 0){
    h += '<tr><td colspan="4" style="padding:20px;text-align:center;color:var(--t2)">No se encontraron productos</td></tr>';
  }
  h += '</tbody></table>';
  document.getElementById('cot-tbl').innerHTML = h;
}

function cotSelectProduct(idxInP){
  window._cotState.productoP_idx = idxInP;
  // Resetear precio al actual del nuevo producto
  var p = P[idxInP];
  window._cotState.precio = p.pv;
  if(document.getElementById('cotPrecio')){
    document.getElementById('cotPrecio').value = p.pv.toFixed(4);
    document.getElementById('cotPrecioRange').max = (p.pv * 2).toFixed(2);
    document.getElementById('cotPrecioRange').value = p.pv;
  }
  cotDoFiltro();  // refresca la tabla con la nueva selección marcada
  cotCalcular();
}

function cotInicializar(){
  var p = P[window._cotState.productoP_idx];
  if(!p) return;
  if(window._cotState.precio === 0 || !window._cotState.precio){
    window._cotState.precio = p.pv;
    document.getElementById('cotPrecio').value = p.pv.toFixed(4);
  }
  var maxRange = p.pv * 2;
  document.getElementById('cotPrecioRange').max = maxRange.toFixed(2);
  document.getElementById('cotPrecioRange').value = window._cotState.precio;
  cotCalcular();
}

function cotCalcular(){
  var p = P[window._cotState.productoP_idx];
  if(!p) return;
  var volCliente = parseFloat(document.getElementById('cotVolumen').value) || 0;
  var precio = parseFloat(document.getElementById('cotPrecio').value) || 0;
  window._cotState.volMensual = volCliente;
  window._cotState.precio = precio;
  
  // Parámetros del dashboard
  var TC = gp('pTC');
  // Volumen mensual REAL del negocio (única fuente de verdad: Σ p.v / 12)
  var volMensualActual = getVolMensualReal();
  var FL = gp('pFL');
  var IMP = gp('pIMP') / 100;
  var GF_actual = gp('pGF')+gp('pBACK');
  var MOD = gp('pMOD');
  var TNA = gp('pTNA') / 100;
  
  // Gastos fijos absolutos en USD/mes (reverso del cálculo del dashboard)
  var gastosFijosTotalesUSD = GF_actual * volMensualActual;
  
  // Volumen total con cliente y nuevo GF/kg
  var volMensualNuevo = volMensualActual + volCliente;
  var GF_nuevo = volMensualNuevo > 0 ? gastosFijosTotalesUSD / volMensualNuevo : 0;
  
  // Costo base (sin GF)
  var costoBase = p.mp + MOD + FL;
  
  // ============ Renderizar info del producto ============
  var pInfo = document.getElementById('cotProductoInfo');
  if(pInfo){
    pInfo.innerHTML =
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:8px">' +
      '<div><div style="color:var(--t2);font-size:10px">Producto</div><div style="color:var(--ac);font-weight:600">['+p.l+'] '+p.p+'</div></div>' +
      '<div><div style="color:var(--t2);font-size:10px">Precio actual</div><div style="color:var(--t1);font-weight:600">USD '+p.pv.toFixed(4)+'/kg</div></div>' +
      '<div><div style="color:var(--t2);font-size:10px">Costo MP/r</div><div style="color:var(--t1);font-weight:600">USD '+(p.mp).toFixed(4)+'/kg</div></div>' +
      '<div><div style="color:var(--t2);font-size:10px">Volumen actual</div><div style="color:var(--t1);font-weight:600">'+Math.round(p.v).toLocaleString('es-AR')+' kg/año</div></div>' +
      '</div>';
  }
  
  // ============ Renderizar impacto del volumen ============
  var deltaGF = GF_nuevo - GF_actual;
  var pctIncVol = volMensualActual > 0 ? (volCliente / volMensualActual * 100) : 0;
  document.getElementById('cotImpactoVolumen').innerHTML =
    '📊 Volumen actual empresa: <b>'+Math.round(volMensualActual).toLocaleString('es-AR')+'</b> kg/mes  →  Nuevo total: <b>'+Math.round(volMensualNuevo).toLocaleString('es-AR')+'</b> kg/mes (+'+pctIncVol.toFixed(1)+'%)<br>' +
    '📊 GF/kg actual: <b>USD '+GF_actual.toFixed(4)+'</b>  →  GF/kg con cliente: <b>USD '+GF_nuevo.toFixed(4)+'</b> (ahorro USD '+Math.abs(deltaGF).toFixed(4)+'/kg)';
  
  // ============ ESCENARIOS DE PRECIO (la tabla nueva) ============
  // Fórmulas (igual que doFPR pero usando GF_nuevo)
  // CMG 15%: precio donde CMG sea 15% del precio
  var pCMG15 = (1 - IMP - 0.15) > 0 ? ((p.mp) + MOD + FL) / (1 - IMP - 0.15) : 0;
  var cmg15 = pCMG15 - (p.mp) - MOD - pCMG15*IMP - FL;
  // Breakeven: precio donde EBITDA = 0
  var pBE = (1 - IMP) > 0 ? (costoBase + GF_nuevo) / (1 - IMP) : 0;
  // +20%, +30%, +40%
  var p20 = pBE * 1.20;
  var p30 = pBE * 1.30;
  var p40 = pBE * 1.40;
  
  // EBITDA por kg para cada escenario
  function calcEbitda(pp){
    return pp - (p.mp) - MOD - pp*IMP - FL - GF_nuevo;
  }
  function calcEbitdaCMG15(pp){
    // En CMG 15% se computa CMG (sin GF)
    return pp - (p.mp) - MOD - pp*IMP - FL;
  }
  
  var e_cmg15 = calcEbitdaCMG15(pCMG15) - GF_nuevo;  // EBITDA real (con GF) en P.CMG15
  var e_be = 0;  // por definición
  var e_20 = calcEbitda(p20);
  var e_30 = calcEbitda(p30);
  var e_40 = calcEbitda(p40);
  var e_tu = calcEbitda(precio);
  
  function escRow(label, color, precio_e, ebitda_unit, isYou){
    var ebitdaMensual = ebitda_unit * volCliente;
    var ebitdaAnual = ebitdaMensual * 12;
    var bg = isYou ? 'background:rgba(135,206,235,0.12);' : '';
    var ebitdaColor = ebitda_unit >= 0 ? 'var(--gn)' : 'var(--rd)';
    return '<tr style="border-bottom:1px solid var(--bd);'+bg+'">' +
      '<td style="padding:8px;font-weight:'+(isYou?'700':'600')+';color:'+color+'">'+(isYou?'🎯 ':'')+label+'</td>' +
      '<td style="padding:8px;text-align:right;font-family:monospace;font-size:13px;color:'+(isYou?'var(--ac)':'var(--tx)')+';font-weight:'+(isYou?'700':'500')+'">USD '+precio_e.toFixed(4)+'</td>' +
      '<td style="padding:8px;text-align:right;font-family:monospace;font-size:13px;color:'+ebitdaColor+';font-weight:'+(isYou?'700':'500')+'">'+(ebitda_unit>=0?'+':'')+ebitda_unit.toFixed(4)+'</td>' +
      '<td style="padding:8px;text-align:right;font-family:monospace;color:'+ebitdaColor+';font-weight:'+(isYou?'700':'400')+'">USD '+ebitdaMensual.toLocaleString('es-AR',{maximumFractionDigits:0})+'</td>' +
      '<td style="padding:8px;text-align:right;font-family:monospace;color:'+ebitdaColor+';font-weight:'+(isYou?'700':'400')+'">USD '+ebitdaAnual.toLocaleString('es-AR',{maximumFractionDigits:0})+'</td>' +
      '</tr>';
  }
  
  var tabHtml = '<table style="width:100%;font-size:12px"><thead><tr style="background:var(--s1)">' +
    '<th style="padding:8px;text-align:left;color:var(--t2);font-size:11px">Escenario</th>' +
    '<th style="padding:8px;text-align:right;color:var(--t2);font-size:11px">Precio (USD/kg)</th>' +
    '<th style="padding:8px;text-align:right;color:var(--t2);font-size:11px">EBITDA (USD/kg)</th>' +
    '<th style="padding:8px;text-align:right;color:var(--t2);font-size:11px">EBITDA mensual</th>' +
    '<th style="padding:8px;text-align:right;color:var(--t2);font-size:11px">EBITDA anual</th>' +
    '</tr></thead><tbody>';
  tabHtml += escRow('CMG 15%', 'var(--ac)', pCMG15, e_cmg15, false);
  tabHtml += escRow('Breakeven (EBITDA=0)', 'var(--or)', pBE, e_be, false);
  tabHtml += escRow('+20% sobre BE', 'var(--gn)', p20, e_20, false);
  tabHtml += escRow('+30% sobre BE', 'var(--gn)', p30, e_30, false);
  tabHtml += escRow('+40% sobre BE', 'var(--gn)', p40, e_40, false);
  tabHtml += escRow('Tu cotización', 'var(--ac)', precio, e_tu, true);
  tabHtml += '</tbody></table>';
  
  // Mensaje contextual debajo de la tabla
  var msg = '';
  if(precio < pBE){
    msg = '<div style="margin-top:12px;padding:10px;background:#3a1f1f;border-radius:6px;color:var(--rd);font-size:12px">⚠️ Tu precio (USD '+precio.toFixed(4)+') está por DEBAJO del Breakeven (USD '+pBE.toFixed(4)+'). Este cliente daría EBITDA negativo.</div>';
  } else if(precio < p20){
    msg = '<div style="margin-top:12px;padding:10px;background:#3a2f1f;border-radius:6px;color:var(--or);font-size:12px">📍 Tu precio está entre Breakeven y +20%. Genera EBITDA pero ajustado.</div>';
  } else if(precio < p40){
    msg = '<div style="margin-top:12px;padding:10px;background:#1f3a1f;border-radius:6px;color:var(--gn);font-size:12px">✅ Tu precio está en zona saludable (entre +20% y +40% sobre BE).</div>';
  } else {
    msg = '<div style="margin-top:12px;padding:10px;background:#1f3a1f;border-radius:6px;color:var(--gn);font-size:12px">🚀 Tu precio está por encima del +40% sobre BE. Excelente margen.</div>';
  }
  tabHtml += msg;
  
  document.getElementById('cotEscenariosBody').innerHTML = tabHtml;
  
  // ============ Renderizar impacto en negocio total ============
  var totalsActuales = totalsPL(calcAllPL());
  var ebitdaActual = totalsActuales.ebitda;
  var revenueActual = totalsActuales.rev;
  var ebitda_anual_cliente = e_tu * volCliente * 12;
  var ebitdaConCliente = ebitdaActual + ebitda_anual_cliente;
  var revenueConCliente = revenueActual + (precio * volCliente * 12);
  var deltaEBITDA = ebitda_anual_cliente;
  
  document.getElementById('cotImpactoBody').innerHTML =
    '<table style="width:100%;font-size:13px"><tr style="color:var(--t2);border-bottom:1px solid var(--bd)"><td style="padding:8px"></td><td style="padding:8px;text-align:right">Sin cliente</td><td style="padding:8px;text-align:right">Con cliente</td><td style="padding:8px;text-align:right">Diferencia</td></tr>' +
    '<tr><td style="padding:8px;color:var(--t1)"><b>Revenue anual</b></td><td style="padding:8px;text-align:right">USD '+revenueActual.toLocaleString('es-AR',{maximumFractionDigits:0})+'</td><td style="padding:8px;text-align:right">USD '+revenueConCliente.toLocaleString('es-AR',{maximumFractionDigits:0})+'</td><td style="padding:8px;text-align:right;color:var(--gn)">+USD '+(revenueConCliente-revenueActual).toLocaleString('es-AR',{maximumFractionDigits:0})+'</td></tr>' +
    '<tr><td style="padding:8px;color:var(--t1)"><b>EBITDA anual</b></td><td style="padding:8px;text-align:right;color:'+(ebitdaActual>=0?'var(--gn)':'var(--rd)')+'">USD '+ebitdaActual.toLocaleString('es-AR',{maximumFractionDigits:0})+'</td><td style="padding:8px;text-align:right;color:'+(ebitdaConCliente>=0?'var(--gn)':'var(--rd)')+'">USD '+ebitdaConCliente.toLocaleString('es-AR',{maximumFractionDigits:0})+'</td><td style="padding:8px;text-align:right;color:'+(deltaEBITDA>=0?'var(--gn)':'var(--rd)')+'">'+(deltaEBITDA>=0?'+':'')+'USD '+deltaEBITDA.toLocaleString('es-AR',{maximumFractionDigits:0})+'</td></tr>' +
    '</table>' +
    '<div style="margin-top:12px;padding:10px;background:'+(deltaEBITDA>=0?'#1f3a1f':'#3a1f1f')+';border-radius:6px;font-size:12px;color:var(--t1)">' +
    (deltaEBITDA>=0 ? '💡 Tomar este cliente <b>MEJORA</b> el EBITDA total en USD '+deltaEBITDA.toLocaleString('es-AR',{maximumFractionDigits:0})+' anuales.' : '⚠️ Tomar este cliente <b>EMPEORA</b> el EBITDA total en USD '+Math.abs(deltaEBITDA).toLocaleString('es-AR',{maximumFractionDigits:0})+' anuales.') +
    '</div>';
  
  // ============ Renderizar punto de quiebre ============
  // A qué volumen mensual del cliente este precio cotizado da EBITDA = 0
  var GF_meta = precio * (1-IMP) - costoBase;  // GF/kg meta (al cual EBITDA cliente = 0)
  var quiebreBody = '';
  if(GF_meta > 0){
    var volMensualMinimo = gastosFijosTotalesUSD / GF_meta;
    var volClienteMinimo = volMensualMinimo - volMensualActual;
    if(volClienteMinimo > 0){
      quiebreBody = 'Al precio cotizado de <b>USD '+precio.toFixed(4)+'/kg</b>, el cliente debe comprar al menos <b>'+Math.ceil(volClienteMinimo).toLocaleString('es-AR')+' kg/mes</b> para que valga la pena.';
      if(volCliente >= volClienteMinimo){
        quiebreBody += '<br><span style="color:var(--gn)">✅ El volumen actual ('+Math.round(volCliente).toLocaleString('es-AR')+' kg/mes) supera el mínimo. Buena cotización.</span>';
      } else {
        var faltante = volClienteMinimo - volCliente;
        quiebreBody += '<br><span style="color:var(--rd)">⚠️ Faltan '+Math.ceil(faltante).toLocaleString('es-AR')+' kg/mes para llegar al punto de equilibrio. Negociá más volumen o subí el precio.</span>';
      }
    } else {
      quiebreBody = '<span style="color:var(--gn)">✅ A este precio el negocio funciona ya con el volumen actual. Cualquier volumen adicional mejora.</span>';
    }
  } else {
    quiebreBody = '<span style="color:var(--rd)">⚠️ A este precio NO hay punto de quiebre alcanzable. El precio no cubre ni los costos variables (mp + MOD + IMP + Flete). Subí el precio.</span>';
  }
  document.getElementById('cotQuiebreBody').innerHTML = quiebreBody;
}

    ['Breakeven', pBE.toFixed(4), '0.0000', '0.00', '0.00'],

    ['+30% sobre BE', (pBE*1.30).toFixed(4), calcEb(pBE*1.30).toFixed(4), (calcEb(pBE*1.30)*volCliente).toFixed(2), (calcEb(pBE*1.30)*volCliente*12).toFixed(2)],
    ['+40% sobre BE', (pBE*1.40).toFixed(4), calcEb(pBE*1.40).toFixed(4), (calcEb(pBE*1.40)*volCliente).toFixed(2), (calcEb(pBE*1.40)*volCliente*12).toFixed(2)],

  var filtered=G.map(function(g,i){return Object.assign({},g,{i:i})}).filter(function(g){if(fe!=='ALL'&&g.empresa!==fe)return false;if(fs&&!(g.nombre+g.concepto+g.posicion).toLowerCase().includes(fs))return false;return true;});
  var fmtG=function(n){return Math.abs(n).toLocaleString('es-AR',{maximumFractionDigits:0})};
  var h='<table><thead><tr><th>Emp</th><th>Concepto</th><th>Nombre</th><th style="text-align:right">Costo</th><th style="text-align:center;color:var(--ac)">RECSA</th><th style="text-align:center;color:var(--ac)">RECSA L+B</th><th style="text-align:center;color:var(--gn)">VIVALCE</th><th style="text-align:center;color:var(--gn)">VIVALCE L+B</th><th>Σ</th></tr></thead><tbody>';
  filtered.forEach(function(g){var i=g.i,a=GA[i];var sR1=a.cdir_r+a.fijo_r,sR2=a.logis_r+a.back_r,sV1=a.cdir_v+a.fijo_v,sV2=a.logis_v+a.back_v;var total=sR1+sR2+sV1+sV2;var ok=Math.abs(total-1)<=.05||g.costo_final===0;var tag=g.empresa==='RECSA'?'<span class="tag" style="background:rgba(79,140,255,.15);color:var(--ac)">R</span>':'<span class="tag" style="background:rgba(0,212,170,.15);color:var(--gn)">V</span>';
  h+='<tr><td>'+tag+'</td><td style="font-size:10px;color:var(--t2)">'+g.concepto+'</td><td style="font-weight:500;font-size:11px">'+g.nombre+'</td><td class="mono" style="text-align:right">'+fmtG(g.costo_final)+'</td>';
  h+='<td><input type="range" min="0" max="100" value="'+Math.round(sR1*100)+'" oninput="updG('+i+',\x27r1\x27,this.value)" style="width:50px"><span class="pv" id="gv'+i+'r1">'+Math.round(sR1*100)+'%</span></td>';
  h+='<td><input type="range" min="0" max="100" value="'+Math.round(sR2*100)+'" oninput="updG('+i+',\x27r2\x27,this.value)" style="width:50px"><span class="pv" id="gv'+i+'r2">'+Math.round(sR2*100)+'%</span></td>';
  h+='<td><input type="range" min="0" max="100" value="'+Math.round(sV1*100)+'" oninput="updG('+i+',\x27v1\x27,this.value)" style="width:50px"><span class="pv" id="gv'+i+'v1">'+Math.round(sV1*100)+'%</span></td>';
  h+='<td><input type="range" min="0" max="100" value="'+Math.round(sV2*100)+'" oninput="updG('+i+',\x27v2\x27,this.value)" style="width:50px"><span class="pv" id="gv'+i+'v2">'+Math.round(sV2*100)+'%</span></td>';
  h+='<td class="mono" style="color:'+(ok?'var(--gn)':'var(--rd)')+'">'+Math.round(total*100)+'%</td></tr>';});
  h+='</tbody></table>';document.getElementById("g-tbl").innerHTML=h;
}
function updG(i,group,val){
  var pct=val/100,a=GA[i];
  if(group==='r1'){var old=a.cdir_r+a.fijo_r;if(old>0){a.cdir_r=pct*(a.cdir_r/old);a.fijo_r=pct*(a.fijo_r/old)}else{a.cdir_r=pct*.5;a.fijo_r=pct*.5}}
  else if(group==='r2'){var old=a.logis_r+a.back_r;if(old>0){a.logis_r=pct*(a.logis_r/old);a.back_r=pct*(a.back_r/old)}else{a.logis_r=pct*.5;a.back_r=pct*.5}}
  else if(group==='v1'){var old=a.cdir_v+a.fijo_v;if(old>0){a.cdir_v=pct*(a.cdir_v/old);a.fijo_v=pct*(a.fijo_v/old)}else{a.cdir_v=pct*.5;a.fijo_v=pct*.5}}
  else if(group==='v2'){var old=a.logis_v+a.back_v;if(old>0){a.logis_v=pct*(a.logis_v/old);a.back_v=pct*(a.back_v/old)}else{a.logis_v=pct*.5;a.back_v=pct*.5}}
  document.getElementById('gv'+i+group).textContent=val+'%';
  renderGastos();
}

function loadGastos(file){
  if(!file)return;var reader=new FileReader();
  reader.onload=function(e){try{
    var wb=XLSX.read(e.target.result,{type:'array',cellFormula:false});var ws=wb.Sheets[wb.SheetNames[0]];var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:0,raw:true});
    var hdrs=rows[0].map(function(h){return String(h||'').toLowerCase().trim()});var cm={};
    hdrs.forEach(function(h,i){if(h.includes('concepto'))cm.concepto=i;else if(h.includes('nombre'))cm.nombre=i;else if(h.includes('posici'))cm.posicion=i;else if(h.includes('empresa'))cm.empresa=i;else if(h.includes('bruto'))cm.bruto=i;else if(h.includes('factor'))cm.factor=i;else if(h.includes('costo final'))cm.costoFinal=i;else if(h.includes('cdir')&&h.includes('recsa'))cm.cdirR=i;else if(h.includes('fijo')&&h.includes('recsa'))cm.fijoR=i;else if(h.includes('log')&&h.includes('recsa'))cm.logisR=i;else if(h.includes('back')&&h.includes('recsa'))cm.backR=i;else if(h.includes('cdir')&&h.includes('vivalce'))cm.cdirV=i;else if(h.includes('fijo')&&h.includes('vivalce'))cm.fijoV=i;else if(h.includes('log')&&h.includes('vivalce'))cm.logisV=i;else if(h.includes('back')&&h.includes('vivalce'))cm.backV=i;});
    G=[];for(var r=1;r<rows.length;r++){var row=rows[r];var concepto=String(row[cm.concepto]||'').trim();var nombre=String(row[cm.nombre]||'').trim();if(!concepto&&!nombre)continue;if(concepto==='RESUMEN'||concepto==='Total')continue;
    var bruto=parseFloat(row[cm.bruto])||0;var factor=parseFloat(row[cm.factor])||0;var cf=parseFloat(row[cm.costoFinal]);if(isNaN(cf)||cf===0)cf=factor===0?bruto:bruto*(1+factor);if(cf===0)continue;
    var pf=function(v){var n=parseFloat(v);return isNaN(n)?0:n};
    G.push({concepto:concepto,nombre:nombre,posicion:String(row[cm.posicion]||'').trim(),empresa:String(row[cm.empresa]||'').trim(),costo_final:cf,pct_cdir_r:pf(row[cm.cdirR]),pct_fijo_r:pf(row[cm.fijoR]),pct_logis_r:pf(row[cm.logisR]),pct_back_r:pf(row[cm.backR]),pct_cdir_v:pf(row[cm.cdirV]),pct_fijo_v:pf(row[cm.fijoV]),pct_logis_v:pf(row[cm.logisV]),pct_back_v:pf(row[cm.backV])});}
    G.forEach(function(g,i){GA[i]={cdir_r:g.pct_cdir_r,fijo_r:g.pct_fijo_r,logis_r:g.pct_logis_r,back_r:g.pct_back_r,cdir_v:g.pct_cdir_v,fijo_v:g.pct_fijo_v,logis_v:g.pct_logis_v,back_v:g.pct_back_v};});
    renderGastos();
  }catch(err){alert('Error: '+err.message);}};reader.readAsArrayBuffer(file);
}

// ===== LOAD MASTER EXCEL =====
function loadMaster(file){
  if(!file)return;var reader=new FileReader();
  reader.onload=function(e){try{
    var wb=XLSX.read(e.target.result,{type:'array'});var ws=wb.Sheets[wb.SheetNames[0]];var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:0,raw:true});
    var hdrs=rows[0].map(function(h){return String(h||'').toLowerCase().trim()});var cm={};
    hdrs.forEach(function(h,i){if(h.includes('línea')||h.includes('linea'))cm.l=i;else if(h.includes('producto'))cm.p=i;else if(h.includes('precio'))cm.pv=i;else if(h.includes('mp'))cm.mp=i;else if(h.includes('rendimiento'))cm.r=i;else if(h.includes('vol'))cm.v=i;else if(h.includes('origen'))cm.o=i;else if(h.includes('lead'))cm.lt=i;else if(h.includes('stock seg')||h.includes('seguridad'))cm.ss=i;});
    var newP=[];for(var r=1;r<rows.length;r++){var row=rows[r];var prod=String(row[cm.p]||'').trim();if(!prod)continue;var pf=function(v){var n=parseFloat(v);return isNaN(n)?0:Math.abs(n)};
    newP.push({l:String(row[cm.l]||'').trim(),p:prod,pv:pf(row[cm.pv]),mp:pf(row[cm.mp]),r:pf(row[cm.r])||1,v:pf(row[cm.v]),am:0,ifin:0,o:cm.o!==undefined?String(row[cm.o]||'').trim():'LOCAL',lt:cm.lt!==undefined?Math.round(pf(row[cm.lt]))||30:30,ss:cm.ss!==undefined?Math.round(pf(row[cm.ss]))||15:15});}
    if(newP.length>0){P=newP;document.getElementById('dataSource').textContent='Excel: '+file.name+' ('+newP.length+')';document.getElementById('dataSource').style.color='var(--gn)';renderContent();}
  }catch(err){alert('Error: '+err.message);}};reader.readAsArrayBuffer(file);
}
